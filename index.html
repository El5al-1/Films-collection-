<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0B0B0B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>El5al Films</title>
<style>
/* ══════════════════════════════════════════
   CSS RESET & BASE
   ══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0B0B;--bg2:#161616;--card:#202020;--card-hover:#2a2a2a;
  --text:#FFFFFF;--text2:#BDBDBD;--text3:#888;
  --gold:#D4AF37;--gold-dim:#b8962e;--fav:#FFD700;
  --danger:#E53935;--success:#43A047;--info:#42A5F5;
  --radius:14px;--radius-sm:10px;--radius-lg:20px;
  --shadow:0 4px 20px rgba(0,0,0,.4);
  --shadow-sm:0 2px 8px rgba(0,0,0,.3);
  --transition:all .25s cubic-bezier(.4,0,.2,1);
  --font:'Segoe UI','SF Pro Display','Roboto','Noto Sans Arabic',sans-serif;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
html{font-family:var(--font);background:var(--bg);color:var(--text);
  -webkit-tap-highlight-color:transparent;overflow-x:hidden;
  scroll-behavior:smooth}
body{background:var(--bg);min-height:100vh;min-height:100dvh;
  overscroll-behavior:none;position:relative}
input,textarea,select,button{font-family:inherit;font-size:inherit;
  border:none;outline:none;background:none;color:inherit}
button{cursor:pointer;-webkit-user-select:none;user-select:none}
img{display:block;max-width:100%}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:0;height:0}

/* ══════════════════════════════════════════
   SPLASH SCREEN
   ══════════════════════════════════════════ */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .5s ease,visibility .5s ease}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none}
#splash .logo{width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,var(--gold),#b8962e);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;font-weight:800;color:#0B0B0B;margin-bottom:18px;
  animation:splashPulse 1s ease infinite}
#splash h1{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:1px}
#splash p{font-size:13px;color:var(--text3)}
#splash .loader{width:30px;height:30px;margin-top:24px;
  border:3px solid #333;border-top-color:var(--gold);border-radius:50%;
  animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* ══════════════════════════════════════════
   HEADER
   ══════════════════════════════════════════ */
#header{position:fixed;top:0;left:0;right:0;z-index:100;
  height:54px;background:rgba(11,11,11,.92);backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);display:flex;align-items:center;
  padding:0 16px;border-bottom:1px solid rgba(255,255,255,.06)}
#header .h-logo{width:34px;height:34px;border-radius:9px;
  background:linear-gradient(135deg,var(--gold),#b8962e);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:800;color:#0B0B0B;flex-shrink:0}
#header .h-title{flex:1;text-align:center;font-size:17px;font-weight:600;
  letter-spacing:.3px}
#header .h-menu{width:38px;height:38px;display:flex;align-items:center;
  justify-content:center;border-radius:50%;transition:var(--transition);
  flex-shrink:0}
#header .h-menu:active{background:rgba(255,255,255,.1)}
.hamburger{width:22px;height:16px;position:relative;display:flex;
  flex-direction:column;justify-content:space-between}
.hamburger span{display:block;height:2px;background:var(--text);
  border-radius:2px;transition:var(--transition)}
.hamburger.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}

/* ══════════════════════════════════════════
   SIDEBAR OVERLAY & PANEL
   ══════════════════════════════════════════ */
#sidebarOverlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);
  opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease}
#sidebarOverlay.show{opacity:1;visibility:visible}
#sidebar{position:fixed;top:0;bottom:0;z-index:201;width:280px;
  background:var(--bg2);transition:transform .3s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow-y:auto;overscroll-behavior:contain}
html[dir="ltr"] #sidebar{left:0;transform:translateX(-100%)}
html[dir="rtl"] #sidebar{right:0;transform:translateX(100%)}
#sidebar.open{transform:translateX(0)!important}
#sidebar .sb-header{padding:24px 20px 16px;display:flex;align-items:center;gap:14px;
  border-bottom:1px solid rgba(255,255,255,.06)}
#sidebar .sb-logo{width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,var(--gold),#b8962e);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:#0B0B0B;flex-shrink:0}
#sidebar .sb-info h2{font-size:18px;font-weight:700}
#sidebar .sb-info p{font-size:12px;color:var(--text3);margin-top:2px}
#sidebar .sb-nav{padding:12px 0;flex:1}
.sb-item{display:flex;align-items:center;gap:14px;padding:13px 22px;
  font-size:15px;color:var(--text2);transition:var(--transition);cursor:pointer}
.sb-item:active{background:rgba(212,175,55,.08)}
.sb-item.active{color:var(--gold);background:rgba(212,175,55,.06)}
.sb-item .sb-icon{width:22px;text-align:center;font-size:18px}
.sb-divider{height:1px;background:rgba(255,255,255,.06);margin:6px 0}

/* ══════════════════════════════════════════
   MAIN CONTENT AREA
   ══════════════════════════════════════════ */
#app{padding-top:54px;padding-bottom:80px;min-height:100vh;min-height:100dvh}
.page{display:none;animation:pageIn .3s ease}
.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════
   BOTTOM NAVIGATION
   ══════════════════════════════════════════ */
#bottomNav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:0 12px calc(6px + var(--safe-bottom));background:rgba(22,22,22,.95);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:space-around;height:64px}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:12px;transition:var(--transition);
  min-width:56px;position:relative}
.bnav-item:active{transform:scale(.92)}
.bnav-item .bnav-icon{font-size:22px;transition:var(--transition)}
.bnav-item .bnav-label{font-size:10px;color:var(--text3);transition:var(--transition)}
.bnav-item.active .bnav-icon{color:var(--gold);transform:translateY(-2px)}
.bnav-item.active .bnav-label{color:var(--gold);font-weight:600}
.bnav-item.active::before{content:'';position:absolute;top:-1px;left:50%;
  transform:translateX(-50%);width:20px;height:3px;border-radius:0 0 3px 3px;
  background:var(--gold)}

/* ══════════════════════════════════════════
   FAB - FLOATING ACTION BUTTON
   ══════════════════════════════════════════ */
#fab{position:fixed;z-index:99;bottom:76px;width:54px;height:54px;
  border-radius:50%;background:linear-gradient(135deg,var(--gold),#b8962e);
  color:#0B0B0B;font-size:28px;font-weight:300;display:flex;
  align-items:center;justify-content:center;
  box-shadow:0 4px 20px rgba(212,175,55,.35);
  transition:var(--transition);cursor:pointer}
html[dir="ltr"] #fab{right:18px}
html[dir="rtl"] #fab{left:18px}
#fab:active{transform:scale(.9) rotate(90deg)}

/* ══════════════════════════════════════════
   BOTTOM SHEET
   ══════════════════════════════════════════ */
#sheetOverlay{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.55);
  opacity:0;visibility:hidden;transition:opacity .3s ease,visibility .3s ease}
#sheetOverlay.show{opacity:1;visibility:visible}
#bottomSheet{position:fixed;bottom:0;left:0;right:0;z-index:301;
  background:var(--bg2);border-radius:var(--radius-lg) var(--radius-lg) 0 0;
  transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);
  max-height:80vh;overflow-y:auto;padding-bottom:calc(16px + var(--safe-bottom))}
#bottomSheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#444;border-radius:4px;
  margin:10px auto 16px}
.sheet-title{font-size:18px;font-weight:700;padding:0 20px 14px;
  border-bottom:1px solid rgba(255,255,255,.06)}
.sheet-item{display:flex;align-items:center;gap:14px;padding:15px 22px;
  font-size:15px;transition:var(--transition)}
.sheet-item:active{background:rgba(255,255,255,.05)}
.sheet-item .si-icon{width:40px;height:40px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:20px}
.sheet-item:nth-child(2) .si-icon{background:rgba(212,175,55,.12);color:var(--gold)}
.sheet-item:nth-child(3) .si-icon{background:rgba(66,165,245,.12);color:var(--info)}
.sheet-item:nth-child(4) .si-icon{background:rgba(67,160,71,.12);color:var(--success)}

/* ══════════════════════════════════════════
   HOME PAGE
   ══════════════════════════════════════════ */
.home-hero{padding:28px 20px 18px;text-align:center}
.home-hero h2{font-size:22px;font-weight:700;margin-bottom:6px}
.home-quote{min-height:44px;display:flex;align-items:center;justify-content:center}
.home-quote p{font-size:14px;color:var(--gold);font-style:italic;
  transition:opacity .5s ease;opacity:1}
.home-quote p.fading{opacity:0}

/* STAT CARDS GRID */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;
  padding:0 16px 20px}
.stat-card{background:var(--card);border-radius:var(--radius);padding:16px;
  transition:var(--transition);animation:cardIn .4s ease backwards}
.stat-card:active{transform:scale(.97);background:var(--card-hover)}
.stat-card .sc-icon{font-size:24px;margin-bottom:8px}
.stat-card .sc-value{font-size:26px;font-weight:800;margin-bottom:2px}
.stat-card .sc-label{font-size:12px;color:var(--text3)}
.stat-card:nth-child(1){animation-delay:.05s}
.stat-card:nth-child(2){animation-delay:.1s}
.stat-card:nth-child(3){animation-delay:.15s}
.stat-card:nth-child(4){animation-delay:.2s}
.stat-card:nth-child(5){animation-delay:.25s}
.stat-card:nth-child(6){animation-delay:.3s}
.stat-card:nth-child(7){animation-delay:.35s}
.stat-card:nth-child(8){animation-delay:.4s}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

/* ══════════════════════════════════════════
   SECTION HEADERS
   ══════════════════════════════════════════ */
.section-header{display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 12px}
.section-header h3{font-size:17px;font-weight:700}
.section-header a{font-size:13px;color:var(--gold)}

/* ══════════════════════════════════════════
   MOVIE/TV CARDS
   ══════════════════════════════════════════ */
.lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
  padding:0 16px 20px}
.lib-card{background:var(--card);border-radius:var(--radius);overflow:hidden;
  transition:var(--transition);animation:cardIn .35s ease backwards;
  cursor:pointer}
.lib-card:active{transform:scale(.96)}
.lib-card .lc-poster{aspect-ratio:2/3;background:var(--bg2);position:relative;
  overflow:hidden}
.lib-card .lc-poster img{width:100%;height:100%;object-fit:cover}
.lib-card .lc-placeholder{width:100%;height:100%;display:flex;
  align-items:center;justify-content:center;font-size:28px;font-weight:800;
  background:linear-gradient(135deg,#2a2a2a,#1a1a1a);color:var(--text3)}
.lib-card .lc-fav{position:absolute;top:6px;font-size:14px}
html[dir="ltr"] .lib-card .lc-fav{right:6px}
html[dir="rtl"] .lib-card .lc-fav{left:6px}
.lib-card .lc-info{padding:8px 10px 10px}
.lib-card .lc-title{font-size:12px;font-weight:600;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}
.lib-card .lc-year{font-size:11px;color:var(--text3);margin-top:2px}
.lib-card .lc-rating{display:flex;align-items:center;gap:3px;margin-top:4px;
  font-size:11px;color:var(--gold)}

/* COLLECTION CARDS */
.coll-card{background:var(--card);border-radius:var(--radius);overflow:hidden;
  display:flex;gap:12px;padding:14px;transition:var(--transition);
  margin:0 16px 10px;animation:cardIn .35s ease backwards;cursor:pointer}
.coll-card:active{transform:scale(.98)}
.coll-card .cc-posters{display:flex;gap:4px;flex-shrink:0}
.coll-card .cc-mini{width:44px;height:66px;border-radius:6px;background:var(--bg2);
  overflow:hidden;display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:var(--text3)}
.coll-card .cc-mini img{width:100%;height:100%;object-fit:cover}
.coll-card .cc-info{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center}
.coll-card .cc-name{font-size:15px;font-weight:700;margin-bottom:3px}
.coll-card .cc-count{font-size:12px;color:var(--text3)}
.coll-card .cc-progress{height:3px;background:#333;border-radius:3px;margin-top:8px;overflow:hidden}
.coll-card .cc-progress-bar{height:100%;background:var(--gold);border-radius:3px;
  transition:width .5s ease}

/* ══════════════════════════════════════════
   EMPTY STATE
   ══════════════════════════════════════════ */
.empty-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:60px 30px;text-align:center;
  animation:cardIn .5s ease}
.empty-state .es-icon{font-size:64px;margin-bottom:16px;opacity:.3}
.empty-state h3{font-size:18px;font-weight:600;margin-bottom:8px;color:var(--text2)}
.empty-state p{font-size:13px;color:var(--text3);line-height:1.6;max-width:260px}
.empty-state .es-btn{margin-top:20px;padding:12px 28px;background:var(--gold);
  color:#0B0B0B;border-radius:12px;font-weight:700;font-size:14px;
  transition:var(--transition)}
.empty-state .es-btn:active{transform:scale(.95)}

/* ══════════════════════════════════════════
   SEARCH BAR
   ══════════════════════════════════════════ */
.search-bar{margin:14px 16px 10px;position:relative}
.search-bar input{width:100%;height:44px;background:var(--card);
  border-radius:12px;padding:0 16px 0 42px;font-size:14px;color:var(--text);
  border:1px solid transparent;transition:var(--transition)}
html[dir="rtl"] .search-bar input{padding:0 42px 0 16px}
.search-bar input:focus{border-color:rgba(212,175,55,.3);background:var(--card-hover)}
.search-bar input::placeholder{color:var(--text3)}
.search-bar .s-icon{position:absolute;top:50%;transform:translateY(-50%);
  font-size:16px;color:var(--text3)}
html[dir="ltr"] .search-bar .s-icon{left:14px}
html[dir="rtl"] .search-bar .s-icon{right:14px}

/* FILTER CHIPS */
.filter-chips{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;
  scrollbar-width:none}
.filter-chips::-webkit-scrollbar{display:none}
.f-chip{flex-shrink:0;padding:7px 16px;background:var(--card);
  border-radius:20px;font-size:12px;color:var(--text2);
  transition:var(--transition);border:1px solid transparent}
.f-chip:active{transform:scale(.95)}
.f-chip.active{background:rgba(212,175,55,.12);color:var(--gold);
  border-color:rgba(212,175,55,.25)}

/* ══════════════════════════════════════════
   FORM PAGE
   ══════════════════════════════════════════ */
.form-page{padding:16px}
.form-page .fp-header{display:flex;align-items:center;gap:14px;
  margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,.06)}
.form-page .fp-back{width:38px;height:38px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--card);font-size:18px;transition:var(--transition)}
.form-page .fp-back:active{background:var(--card-hover);transform:scale(.92)}
.form-page .fp-title{font-size:20px;font-weight:700}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;color:var(--text2);
  margin-bottom:7px;font-weight:500}
.form-group label .req{color:var(--danger)}
.form-input{width:100%;height:48px;background:var(--card);border-radius:12px;
  padding:0 16px;font-size:14px;color:var(--text);
  border:1px solid rgba(255,255,255,.06);transition:var(--transition)}
.form-input:focus{border-color:rgba(212,175,55,.4);background:var(--card-hover)}
.form-textarea{width:100%;min-height:100px;background:var(--card);border-radius:12px;
  padding:14px 16px;font-size:14px;color:var(--text);resize:vertical;
  border:1px solid rgba(255,255,255,.06);transition:var(--transition);
  line-height:1.5}
.form-textarea:focus{border-color:rgba(212,175,55,.4)}
.form-select{appearance:none;-webkit-appearance:none;width:100%;height:48px;
  background:var(--card);border-radius:12px;padding:0 16px;font-size:14px;
  color:var(--text);border:1px solid rgba(255,255,255,.06);transition:var(--transition)}
.form-select:focus{border-color:rgba(212,175,55,.4)}

/* Genre chips selection */
.genre-selector{display:flex;flex-wrap:wrap;gap:8px}
.genre-chip{padding:7px 14px;background:var(--card);border-radius:20px;
  font-size:12px;color:var(--text2);border:1px solid rgba(255,255,255,.06);
  transition:var(--transition);cursor:pointer}
.genre-chip:active{transform:scale(.95)}
.genre-chip.selected{background:rgba(212,175,55,.12);color:var(--gold);
  border-color:rgba(212,175,55,.3)}

/* Poster upload */
.poster-upload{width:120px;height:180px;border-radius:12px;
  background:var(--card);border:2px dashed rgba(255,255,255,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:6px;cursor:pointer;transition:var(--transition);overflow:hidden;position:relative}
.poster-upload:active{border-color:rgba(212,175,55,.3)}
.poster-upload .pu-icon{font-size:28px;color:var(--text3)}
.poster-upload .pu-text{font-size:11px;color:var(--text3)}
.poster-upload img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.poster-upload input[type="file"]{display:none}

/* Toggle switch */
.toggle-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.toggle-row .tr-label{font-size:14px;color:var(--text2)}
.toggle{width:48px;height:26px;background:#333;border-radius:13px;
  position:relative;transition:var(--transition);cursor:pointer;flex-shrink:0}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:3px;width:20px;height:20px;
  border-radius:50%;background:#fff;transition:var(--transition)}
html[dir="ltr"] .toggle::after{left:3px}
html[dir="rtl"] .toggle::after{right:3px}
html[dir="ltr"] .toggle.on::after{left:25px}
html[dir="rtl"] .toggle.on::after{right:25px}

/* Rating slider */
.rating-display{display:flex;align-items:center;gap:10px}
.rating-display .rd-value{font-size:28px;font-weight:800;color:var(--gold);
  min-width:40px;text-align:center}
.rating-display input[type="range"]{flex:1;-webkit-appearance:none;
  height:4px;background:#333;border-radius:4px;outline:none}
.rating-display input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;
  width:22px;height:22px;border-radius:50%;background:var(--gold);cursor:pointer;
  box-shadow:0 2px 8px rgba(212,175,55,.3)}

/* Save button */
.btn-save{width:100%;height:52px;background:linear-gradient(135deg,var(--gold),#b8962e);
  color:#0B0B0B;border-radius:14px;font-size:16px;font-weight:700;
  transition:var(--transition);margin-top:10px}
.btn-save:active{transform:scale(.97);opacity:.9}
.btn-danger{width:100%;height:48px;background:rgba(229,57,53,.12);
  color:var(--danger);border-radius:14px;font-size:15px;font-weight:600;
  transition:var(--transition);margin-top:10px}
.btn-danger:active{transform:scale(.97)}

/* ══════════════════════════════════════════
   DETAIL PAGE
   ══════════════════════════════════════════ */
.detail-page{animation:pageIn .3s ease}
.detail-poster-wrap{width:100%;position:relative;display:flex;justify-content:center;
  padding:20px 0 10px;background:linear-gradient(180deg,rgba(32,32,32,.5),transparent)}
.detail-poster{width:160px;height:240px;border-radius:16px;overflow:hidden;
  box-shadow:0 8px 30px rgba(0,0,0,.5)}
.detail-poster img{width:100%;height:100%;object-fit:cover}
.detail-poster .lc-placeholder{width:100%;height:100%;display:flex;
  align-items:center;justify-content:center;font-size:42px;font-weight:800;
  background:linear-gradient(135deg,#2a2a2a,#1a1a1a);color:var(--text3)}
.detail-info{padding:16px 20px}
.detail-info .di-title{font-size:22px;font-weight:800;text-align:center;margin-bottom:4px}
.detail-info .di-original{font-size:13px;color:var(--text3);text-align:center;margin-bottom:10px}
.detail-info .di-meta{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;
  margin-bottom:16px}
.detail-info .di-meta span{font-size:12px;color:var(--text2);
  background:var(--card);padding:5px 12px;border-radius:20px}
.detail-info .di-rating{text-align:center;margin-bottom:16px}
.detail-info .di-rating .stars{font-size:24px;color:var(--gold)}
.detail-info .di-rating .val{font-size:14px;color:var(--text2);margin-top:4px}
.detail-chips{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;
  padding:0 20px 16px}
.detail-chips .dc{padding:5px 14px;background:var(--card);border-radius:20px;
  font-size:12px;color:var(--text2)}
.detail-notes{margin:0 20px 16px;padding:14px;background:var(--card);
  border-radius:12px;font-size:13px;color:var(--text2);line-height:1.6}
.detail-notes .dn-label{font-size:11px;color:var(--text3);margin-bottom:6px;
  text-transform:uppercase;letter-spacing:.5px}
.detail-actions{display:flex;gap:10px;padding:0 20px 20px}
.detail-actions .da-btn{flex:1;height:46px;border-radius:12px;font-size:14px;
  font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;
  transition:var(--transition)}
.detail-actions .da-btn:active{transform:scale(.95)}
.da-edit{background:rgba(212,175,55,.12);color:var(--gold)}
.da-del{background:rgba(229,57,53,.1);color:var(--danger)}
.da-fav{background:rgba(255,215,0,.1);color:var(--fav)}
.da-watch{background:rgba(66,165,245,.1);color:var(--info)}

/* Progress bar for TV series */
.detail-progress{margin:0 20px 16px}
.detail-progress .dp-label{font-size:12px;color:var(--text3);margin-bottom:6px;
  display:flex;justify-content:space-between}
.detail-progress .dp-bar{height:6px;background:#333;border-radius:6px;overflow:hidden}
.detail-progress .dp-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e6c84b);
  border-radius:6px;transition:width .5s ease}

/* ══════════════════════════════════════════
   DIALOG / MODAL
   ══════════════════════════════════════════ */
#dialogOverlay{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.6);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:30px;
  opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease}
#dialogOverlay.show{opacity:1;visibility:visible}
#dialogBox{background:var(--bg2);border-radius:var(--radius-lg);
  width:100%;max-width:320px;padding:24px;
  transform:scale(.9);transition:transform .25s cubic-bezier(.4,0,.2,1)}
#dialogOverlay.show #dialogBox{transform:scale(1)}
#dialogBox h3{font-size:18px;font-weight:700;margin-bottom:8px}
#dialogBox p{font-size:14px;color:var(--text2);line-height:1.5;margin-bottom:20px}
.dialog-btns{display:flex;gap:10px}
.dialog-btns button{flex:1;height:44px;border-radius:12px;font-size:14px;font-weight:600;
  transition:var(--transition)}
.dialog-btns button:active{transform:scale(.95)}
.dlg-cancel{background:var(--card);color:var(--text2)}
.dlg-confirm{background:var(--danger);color:#fff}
.dlg-gold{background:var(--gold);color:#0B0B0B}

/* ══════════════════════════════════════════
   TOAST
   ══════════════════════════════════════════ */
#toastContainer{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  z-index:500;display:flex;flex-direction:column;align-items:center;gap:8px;
  pointer-events:none;width:90%;max-width:340px}
.toast{padding:12px 20px;background:var(--card);border-radius:12px;
  font-size:13px;font-weight:500;color:var(--text);text-align:center;
  box-shadow:var(--shadow);animation:toastIn .3s ease forwards;
  border-left:3px solid var(--gold)}
html[dir="rtl"] .toast{border-left:none;border-right:3px solid var(--gold)}
.toast.out{animation:toastOut .3s ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}

/* ══════════════════════════════════════════
   SETTINGS PAGE
   ══════════════════════════════════════════ */
.settings-section{margin:16px;background:var(--card);border-radius:var(--radius);
  overflow:hidden}
.settings-section .ss-title{font-size:12px;color:var(--gold);font-weight:600;
  padding:14px 16px 8px;text-transform:uppercase;letter-spacing:.5px}
.settings-item{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-top:1px solid rgba(255,255,255,.04);
  transition:var(--transition);cursor:pointer}
.settings-item:first-child{border-top:none}
.settings-item:active{background:rgba(255,255,255,.03)}
.settings-item .si-left{display:flex;align-items:center;gap:12px}
.settings-item .si-icon{font-size:18px;width:22px;text-align:center}
.settings-item .si-text{font-size:14px}
.settings-item .si-right{font-size:13px;color:var(--text3)}
.settings-item .si-chevron{color:var(--text3);font-size:14px}

/* ══════════════════════════════════════════
   ABOUT PAGE
   ══════════════════════════════════════════ */
.about-page{padding:40px 24px;text-align:center}
.about-page .ab-logo{width:80px;height:80px;border-radius:22px;
  background:linear-gradient(135deg,var(--gold),#b8962e);

.about-page h2{font-size:24px;font-weight:800;margin-bottom:4px}
.about-page .ab-ver{font-size:13px;color:var(--gold);margin-bottom:20px}
.about-page .ab-desc{font-size:14px;color:var(--text2);line-height:1.7;

.about-page .ab-info{font-size:12px;color:var(--text3);line-height:1.8}

/* ══════════════════════════════════════════

   ══════════════════════════════════════════ */
.ach-card{display:flex;align-items:center;gap:14px;padding:14px 16px;
  margin:0 16px 10px;background:var(--card);border-radius:var(--radius);
  transition:var(--transition);animation:cardIn .35s ease backwards}
.ach-card.locked{opacity:.45}
.ach-card .ac-icon{font-size:30px;flex-shrink:0}
.ach-card .ac-info{flex:1}
.ach-card .ac-name{font-size:14px;font-weight:700;margin-bottom:2px}
.ach-card .ac-desc{font-size:12px;color:var(--text3)}
.ach-card .ac-check{font-size:18px;color:var(--success)}

.random-page .rp-poster .lc-placeholder{width:100%;height:100%;display:flex;

// ─── DATA PERSISTENCE ────────────────────────────────────────
function loadData() {
  try {
    state.movies = JSON.parse(localStorage.getItem('el5al_movies') || '[]');
    state.series = JSON.parse(localStorage.getItem('el5al_series') || '[]');
    state.achievements = JSON.parse(localStorage.getItem('el5al_ach') || '[]');
  } catch(e) {
    state.movies = []; state.series = []; state.achievements = [];
  }
}
function saveMovies() { localStorage.setItem('el5al_movies', JSON.stringify(state.movies)); }
function saveSeries() { localStorage.setItem('el5al_series', JSON.stringify(state.series)); }
function saveAchievements() { localStorage.setItem('el5al_ach', JSON.stringify(state.achievements)); }

// ─── i18n ────────────────────────────────────────────────────
function t(key) { return LANG[state.lang][key] || key; }

function applyLanguage() {
  const html = document.documentElement;
  html.lang = state.lang === 'ar' ? 'ar' : 'en';
  html.dir = state.lang === 'ar' ? 'rtl' : 'ltr';
  localStorage.setItem('el5al_lang', state.lang);
  document.getElementById('splashSub') && (document.getElementById('splashSub').textContent =
    state.lang === 'ar' ? 'مكتبتك الشخصية للأفلام' : 'Your Personal Movie Library');
  document.getElementById('sbSub').textContent =
    state.lang === 'ar' ? 'المكتبة الشخصية' : 'Personal Library';
}

function switchLanguage(lang) {
  state.lang = lang;
  applyLanguage();
  renderSidebar();
  renderBottomNav();
  navigateTo(state.currentPage);
}

// ─── GENERATE ID ─────────────────────────────────────────────
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

// ─── INITIALS ────────────────────────────────────────────────
function getInitials(title) {
  if (!title) return '?';
  const words = title.trim().split(/\s+/);
  if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
  return (words[0][0] + words[1][0]).toUpperCase();
}

// ─── IMAGE COMPRESSION ──────────────────────────────────────
function compressImage(file, maxW, maxH, quality) {
  return new Promise((resolve) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxW) { h = h * maxW / w; w = maxW; }
        if (h > maxH) { w = w * maxH / h; h = maxH; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', quality || 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function compressThumb(dataUrl) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const maxW = 120, maxH = 180;
      if (w > maxW) { h = h * maxW / w; w = maxW; }
      if (h > maxH) { w = w * maxH / h; h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      resolve(canvas.toDataURL('image/jpeg', 0.5));
    };
    img.src = dataUrl;
  });
}

// ─── TOAST ───────────────────────────────────────────────────
function showToast(msg, color) {
  const c = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = 'toast';
  if (color) el.style.borderColor = color;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.classList.add('out'); setTimeout(() => el.remove(), 300); }, 2500);
}

// ─── DIALOG ──────────────────────────────────────────────────
function showDialog(title, msg, confirmText, onConfirm, confirmClass) {
  const overlay = document.getElementById('dialogOverlay');
  const box = document.getElementById('dialogBox');
  box.innerHTML = `<h3>${title}</h3><p>${msg}</p>
    <div class="dialog-btns">
      <button class="dlg-cancel" onclick="closeDialog()">${t('cancel')}</button>
      <button class="${confirmClass || 'dlg-confirm'}" id="dlgConfirmBtn">${confirmText}</button>
    </div>`;
  overlay.classList.add('show');
  document.getElementById('dlgConfirmBtn').onclick = () => { closeDialog(); onConfirm(); };
}
function closeDialog() { document.getElementById('dialogOverlay').classList.remove('show'); }

function renderSidebar() {
  const items = [
    {id:'home',icon:'🏠',label:t('home')},
    {id:'movies',icon:'🎬',label:t('movies')},
    {id:'tv',icon:'📺',label:t('tvSeries')},
    {id:'collections',icon:'📁',label:t('collections')},
    {div:true},
    {id:'statistics',icon:'📊',label:t('statistics')},
    {id:'achievements',icon:'🏆',label:t('achievements')},
    {id:'favorites',icon:'❤️',label:t('favorites')},
    {id:'watchlist',icon:'📋',label:t('watchlist')},
    {id:'recent',icon:'🕐',label:t('recentlyAdded')},
    {id:'random',icon:'🎲',label:t('randomMovie')},
    {div:true},
    {id:'settings',icon:'⚙️',label:t('settings')},
    {id:'about',icon:'ℹ️',label:t('about')},
  ];
  const nav = document.getElementById('sidebarNav');
  nav.innerHTML = items.map(it => {
    if (it.div) return '<div class="sb-divider"></div>';
    return `<div class="sb-item${state.currentPage===it.id?' active':''}" data-page="${it.id}">
      <span class="sb-icon">${it.icon}</span><span>${it.label}</span></div>`;
  }).join('');
  nav.querySelectorAll('.sb-item').forEach(el => {
    el.addEventListener('click', () => { closeSidebar(); navigateTo(el.dataset.page); });
  });
}

function openSidebar() {
  state.sidebarOpen = true;
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebarOverlay').classList.add('show');
  document.getElementById('hamburger').classList.add('active');
}
function closeSidebar() {
  state.sidebarOpen = false;
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('show');

// ─── NAVIGATION ──────────────────────────────────────────────
function navigateTo(page, data) {
  // Push to history
  if (page !== state.currentPage) {
    state.pageHistory.push(page);
    if (state.pageHistory.length > 50) state.pageHistory.shift();
  }
  state.currentPage = page;
  state.pageData = data;

  // Update header
  const titleMap = {
    home:t('home'), movies:t('movies'), tv:t('tvSeries'), collections:t('collections'),
    settings:t('settings'), statistics:t('statistics'), achievements:t('achievements'),
    favorites:t('favorites'), watchlist:t('watchlist'), recent:t('recentlyAdded'),
    random:t('randomMovie'), about:t('about'), addMovie:t('addMovie'),
    addSeries:t('addTvSeries'), quickCollections:t('quickCollections'),
    editMovie:t('edit'), editSeries:t('edit'),
    movieDetail:t('movies'), seriesDetail:t('tvSeries'),
    qcDetail:t('quickCollections'), collectionDetail:t('collections'),
  };
  document.getElementById('headerTitle').textContent = titleMap[page] || t('home');

  // Render page
  const app = document.getElementById('app');
  const renderers = {
    home: renderHome, movies: renderMovies, tv: renderTV,
    collections: renderCollections, settings: renderSettings,
    statistics: renderStatistics, achievements: renderAchievements,
    favorites: renderFavorites, watchlist: renderWatchlist,
    recent: renderRecent, random: renderRandom, about: renderAbout,
    addMovie: renderAddMovie, addSeries: renderAddSeries,
    editMovie: renderEditMovie, editSeries: renderEditSeries,
    movieDetail: renderMovieDetail, seriesDetail: renderSeriesDetail,
    quickCollections: renderQuickCollections, qcDetail: renderQCDetail,
    collectionDetail: renderCollectionDetail,
  };
  if (renderers[page]) app.innerHTML = `<div class="page active">${renderers[page](data)}</div>`;

  // Update nav highlights
  renderBottomNav();
  renderSidebar();

  // Push browser history
  if (window.history && window.history.pushState) {
    window.history.pushState({page, data}, '', '#' + page);
  }

  // Scroll top
  window.scrollTo(0, 0);
}

function goBack() {
  if (state.pageHistory.length > 1) {
    state.pageHistory.pop();
    const prev = state.pageHistory[state.pageHistory.length - 1];
    state.currentPage = '';
    navigateTo(prev);
  }
}

// ─── QUOTES ROTATION ────────────────────────────────────────
function startQuoteRotation() {
  setInterval(() => {
    const el = document.getElementById('homeQuote');
    if (!el) return;
    el.classList.add('fading');
    setTimeout(() => {
      const quotes = state.lang === 'ar' ? QUOTES_AR : QUOTES_EN;
      state.quoteIndex = (state.quoteIndex + 1) % quotes.length;
      el.textContent = quotes[state.quoteIndex];
      el.classList.remove('fading');
    }, 500);
  }, 4000);
}

// ─── STATISTICS HELPER ───────────────────────────────────────
function getStats() {
  const m = state.movies, s = state.series, all = [...m, ...s];
  const watchedM = m.filter(x => x.watched).length;
  const watchedS = s.filter(x => x.watched || x.status === 'Completed').length;
  const favs = all.filter(x => x.favorite).length;
  const wl = all.filter(x => x.watchlist).length;
  const rated = all.filter(x => x.rating > 0).length;
  const ratings = all.filter(x => x.rating > 0).map(x => x.rating);
  const avgRating = ratings.length ? (ratings.reduce((a,b)=>a+b,0)/ratings.length).toFixed(1) : 0;
  const collections = new Set(m.filter(x=>x.collection).map(x=>x.collection));
  const collectionsS = new Set(s.filter(x=>x.collection).map(x=>x.collection));
  const allColls = new Set([...collections, ...collectionsS]);

  return {
    totalMovies: m.length, totalSeries: s.length,
    watched: watchedM + watchedS, watchedM, watchedS,
    favorites: favs, watchlist: wl, rated,
    avgRating, collections: allColls.size,
    imported: parseInt(localStorage.getItem('el5al_imports')||'0')
  };
}

// ─── CHECK ACHIEVEMENTS ─────────────────────────────────────
function checkAchievements() {
  const stats = getStats();
  let newUnlock = false;
  ACHIEVEMENTS_DEF.forEach(a => {
    if (!state.achievements.includes(a.id) && a.check(stats)) {
      state.achievements.push(a.id);
      newUnlock = true;
      const name = state.lang === 'ar' ? a.ar : a.en;
      showToast(`${a.icon} ${state.lang==='ar'?'إنجاز جديد: ':'Achievement: '}${name}`, 'var(--gold)');
    }
  });
  if (newUnlock) saveAchievements();
}

// ─── DUPLICATE CHECK ─────────────────────────────────────────
function isDuplicate(title, year, type, excludeId) {
  const list = type === 'movie' ? state.movies : state.series;
  return list.some(x => x.id !== excludeId && x.title.toLowerCase() === title.toLowerCase() && x.year == year);
}

let movieFilter = 'all';
function setMovieFilter(f, el) {
  movieFilter = f;
  document.querySelectorAll('#movieFilterChips .f-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  filterMovies();
}

function filterMovies() {
  const q = (document.getElementById('movieSearch')?.value || '').toLowerCase();
  let list = [...state.movies];

  // Filter
  if (movieFilter === 'watched') list = list.filter(m => m.watched);
  else if (movieFilter === 'fav') list = list.filter(m => m.favorite);
  else if (movieFilter === 'watchlist') list = list.filter(m => m.watchlist);
  else if (movieFilter === 'arab') list = list.filter(m => m.country === 'Arabic');
  else if (movieFilter === 'foreign') list = list.filter(m => m.country === 'Foreign');

  // Sort
  if (movieFilter === 'rating') list.sort((a,b) => (b.rating||0) - (a.rating||0));
  else if (movieFilter === 'az') list.sort((a,b) => a.title.localeCompare(b.title));
  else if (movieFilter === 'newest') list.sort((a,b) => (b.year||0) - (a.year||0));

  // Search
  if (q) {
    list = list.filter(m =>
      (m.title||'').toLowerCase().includes(q) ||
      (m.originalTitle||'').toLowerCase().includes(q) ||
      (m.collection||'').toLowerCase().includes(q) ||
      (m.genres||[]).join(' ').toLowerCase().includes(q) ||
      (m.notes||'').toLowerCase().includes(q) ||
      String(m.year).includes(q)
    );
  }

  const grid = document.getElementById('moviesGrid');
  if (grid) grid.innerHTML = list.length
    ? list.map(m => renderCard({...m, type:'movie'})).join('')
    : `<div style="grid-column:1/-1" class="empty-state"><div class="es-icon">🔍</div><p>${state.lang==='ar'?'لا نتائج':'No results'}</p></div>`;
}

// ─── COLLECTIONS PAGE ────────────────────────────────────────
function renderCollections() {
  const allItems = [...state.movies.map(m=>({...m,type:'movie'})), ...state.series.map(s=>({...s,type:'series'}))];
  const collMap = {};
  allItems.forEach(it => {
    if (it.collection) {
      if (!collMap[it.collection]) collMap[it.collection] = [];
      collMap[it.collection].push(it);
    }
  });
  const collNames = Object.keys(collMap);
  if (collNames.length === 0) {
    return `<div class="empty-state">
      <div class="es-icon">📁</div>
      <h3>${t('collections')}</h3>
      <p>${t('noCollections')}</p>
    </div>`;
  }
  return collNames.map(name => {
    const items = collMap[name];
    const watched = items.filter(x => x.watched || x.status === 'Completed').length;
    const pct = Math.round(watched / items.length * 100);
    const previews = items.slice(0, 3);
    return `<div class="coll-card" onclick="navigateTo('collectionDetail','${encodeURIComponent(name)}')">
      <div class="cc-posters">${previews.map(p => {
        if (p.thumb || p.poster) return `<div class="cc-mini"><img src="${p.thumb || p.poster}" alt=""></div>`;
        return `<div class="cc-mini">${getInitials(p.title)}</div>`;
      }).join('')}</div>
      <div class="cc-info">
        <div class="cc-name">${name}</div>
        <div class="cc-count">${items.length} ${state.lang==='ar'?'عنوان':'titles'} · ${pct}%</div>
        <div class="cc-progress"><div class="cc-progress-bar" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

// ─── SAVE MOVIE ──────────────────────────────────────────────
let pendingPoster = null;
async function saveMovie(editId) {
  const title = document.getElementById('fTitle').value.trim();
  const year = parseInt(document.getElementById('fYear').value);
  if (!title) { showToast(state.lang==='ar'?'الاسم مطلوب':'Title is required', 'var(--danger)'); return; }
  if (!year || year < 1900) { showToast(state.lang==='ar'?'السنة مطلوبة':'Year is required', 'var(--danger)'); return; }

  // Duplicate check
  if (isDuplicate(title, year, 'movie', editId)) {
    showToast(t('duplicateMsg'), 'var(--danger)');
    return;
  }

  const genres = Array.from(document.querySelectorAll('#genreSelector .genre-chip.selected')).map(el => el.textContent);
  const rating = parseFloat(document.querySelector('.rating-display input[type="range"]').value);

  const movieData = {
    title, year,
    originalTitle: document.getElementById('fOriginal').value.trim(),
    country: document.getElementById('fCountry').value,
    genres,
    collection: document.getElementById('fCollection').value.trim(),
    favorite: document.getElementById('fFav').classList.contains('on'),
    watchlist: document.getElementById('fWatchlist').classList.contains('on'),
    watched: document.getElementById('fWatched').classList.contains('on'),
    rating,
    notes: document.getElementById('fNotes').value.trim(),
  };

  if (editId) {
    const idx = state.movies.findIndex(m => m.id === editId);
    if (idx !== -1) {
      if (pendingPoster) {
        movieData.poster = pendingPoster;
        movieData.thumb = await compressThumb(pendingPoster);
      } else {
        movieData.poster = state.movies[idx].poster;
        movieData.thumb = state.movies[idx].thumb;
      }
      movieData.id = editId;
      movieData.dateAdded = state.movies[idx].dateAdded;
      movieData.dateEdited = Date.now();
      state.movies[idx] = movieData;
      showToast(t('movieUpdated'), 'var(--success)');
    }
  } else {
    movieData.id = genId();
    movieData.dateAdded = Date.now();
    movieData.dateEdited = Date.now();
    if (pendingPoster) {
      movieData.poster = pendingPoster;
      movieData.thumb = await compressThumb(pendingPoster);
    }
    state.movies.push(movieData);
    showToast(t('movieAdded'), 'var(--success)');
  }

  pendingPoster = null;
  saveMovies();
  checkAchievements();
  navigateTo('movies');
}

function deleteMovie(id) {
  showDialog(t('confirmDelete'), t('deleteMsg'), t('delete'), () => {
    state.movies = state.movies.filter(m => m.id !== id);
    saveMovies();
    showToast(t('movieDeleted'), 'var(--danger)');
    navigateTo('movies');
  });
}

// ─── STATISTICS ──────────────────────────────────────────────
function renderStatistics() {
  const stats = getStats();
  const all = [...state.movies, ...state.series];

  // Genre distribution
  const genreCounts = {};
  all.forEach(it => (it.genres||[]).forEach(g => { genreCounts[g] = (genreCounts[g]||0) + 1; }));
  const topGenres = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxGenre = topGenres.length ? topGenres[0][1] : 1;

  // Country distribution
  const countryCounts = {};
  all.forEach(it => { if(it.country) countryCounts[it.country] = (countryCounts[it.country]||0) + 1; });
  const topCountries = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1]);
  const maxCountry = topCountries.length ? topCountries[0][1] : 1;

  // Year distribution
  const yearCounts = {};
  all.forEach(it => { if(it.year) { const dec = Math.floor(it.year/10)*10+'s'; yearCounts[dec]=(yearCounts[dec]||0)+1; }});
  const topYears = Object.entries(yearCounts).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,6);
  const maxYear = topYears.length ? Math.max(...topYears.map(y=>y[1])) : 1;

  return `
    <div class="stats-grid" style="padding-top:16px">
      <div class="stat-card"><div class="sc-icon">🎬</div><div class="sc-value">${stats.totalMovies}</div><div class="sc-label">${t('totalMovies')}</div></div>
      <div class="stat-card"><div class="sc-icon">📺</div><div class="sc-value">${stats.totalSeries}</div><div class="sc-label">${t('totalSeries')}</div></div>

function filterQC() {
  const q = (document.getElementById('qcSearch')?.value||'').toLowerCase();
  document.querySelectorAll('.qc-card').forEach((card,i) => {
    const name = QUICK_CATALOG[i].name.toLowerCase();
    card.style.display = name.includes(q) ? '' : 'none';
  });
}

// ─── QC DETAIL ───────────────────────────────────────────────
function renderQCDetail(idx) {
  const c = QUICK_CATALOG[idx];
  if (!c) return '<p>Not found</p>';

  // Initialize selection
  state.qcSelected = {};
  c.movies.forEach((m,i) => {
    const exists = state.movies.some(x => x.title.toLowerCase()===m.title.toLowerCase() && x.year===m.year);
    state.qcSelected[i] = !exists;
  });

  return `
    <div class="qc-detail">
      <div class="form-page" style="padding:0">
        <div class="fp-header">
          <button class="fp-back" onclick="goBack()">←</button>
          <div class="fp-title">${c.name}</div>
        </div>
      </div>
      <div class="qcd-header">
        <div style="font-size:48px;margin-bottom:8px">${c.icon}</div>
        <h2>${c.name}</h2>
        <p>${c.movies.length} ${state.lang==='ar'?'فيلم':'movies'} · ${c.genre} · ${c.years}</p>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px">
        <button class="f-chip" onclick="qcToggleAll(${idx},true)" style="flex:1;text-align:center">${t('selectAll')}</button>
        <button class="f-chip" onclick="qcToggleAll(${idx},false)" style="flex:1;text-align:center">${t('deselectAll')}</button>
      </div>
      <div id="qcMovieList">
        ${c.movies.map((m,i) => {
          const exists = state.movies.some(x => x.title.toLowerCase()===m.title.toLowerCase() && x.year===m.year);
          return `<div class="qc-movie-item">
            <div class="qm-check${!exists && state.qcSelected[i]?' checked':''}" id="qmCheck${i}"
              onclick="${exists?'':(`this.classList.toggle('checked');window._qcSel[${i}]=this.classList.contains('checked')`)}">
              ${exists ? '✓' : (!exists && state.qcSelected[i] ? '✓' : '')}
            </div>
            <div class="qm-info">
              <div class="qm-title">${m.title}</div>
              <div class="qm-year">${m.year}</div>
              ${exists ? `<div class="qm-imported">${state.lang==='ar'?'موجود بالفعل':'Already imported'}</div>` : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
      <button class="btn-save" style="margin-top:20px" onclick="importQC(${idx})">${t('addToLibrary')}</button>
    </div>`;
}
// Expose selection state
window._qcSel = {};

function qcToggleAll(idx, selectAll) {
  const c = QUICK_CATALOG[idx];
  c.movies.forEach((m,i) => {
    const exists = state.movies.some(x => x.title.toLowerCase()===m.title.toLowerCase() && x.year===m.year);
    if (!exists) {
      window._qcSel[i] = selectAll;
      const el = document.getElementById('qmCheck'+i);
      if (el) { el.classList.toggle('checked', selectAll); el.textContent = selectAll ? '✓' : ''; }
    }
  });
}

function importQC(idx) {
  const c = QUICK_CATALOG[idx];
  let imported = 0, skipped = 0;
  c.movies.forEach((m,i) => {
    const exists = state.movies.some(x => x.title.toLowerCase()===m.title.toLowerCase() && x.year===m.year);
    if (exists) { skipped++; return; }
    const sel = window._qcSel[i] !== undefined ? window._qcSel[i] : state.qcSelected[i];
    if (!sel) return;
    state.movies.push({
      id: genId(), title: m.title, year: m.year,
      collection: c.name, genres: [c.genre], country: 'Foreign',
      dateAdded: Date.now(), dateEdited: Date.now(),
      favorite: false, watchlist: false, watched: false, rating: 0, notes: ''
    });
    imported++;
  });
  saveMovies();
  const ic = parseInt(localStorage.getItem('el5al_imports')||'0') + (imported > 0 ? 1 : 0);
  localStorage.setItem('el5al_imports', ic);
  checkAchievements();

  let msg = `${imported} ${t('imported')}`;
  if (skipped > 0) msg += ` · ${skipped} ${t('alreadyExisted')}`;
  showToast(msg, 'var(--success)');
  navigateTo('quickCollections');
}

// ══════════════════════════════════════════════════════════════
// EVENT LISTENERS
// ══════════════════════════════════════════════════════════════
function setupEventListeners() {
  // Menu button
  document.getElementById('menuBtn').addEventListener('click', toggleSidebar);
  // Sidebar overlay
  document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);
  // FAB
  document.getElementById('fab').addEventListener('click', openSheet);
  // Sheet overlay
  document.getElementById('sheetOverlay').addEventListener('click', closeSheet);
  // Dialog overlay
  document.getElementById('dialogOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('dialogOverlay')) closeDialog();
  });

  // File input for poster
  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const compressed = await compressImage(file, 400, 600, 0.75);
    pendingPoster = compressed;
    const upEl = document.getElementById('posterUpload');
    if (upEl) {
      upEl.innerHTML = `<img src="${compressed}" alt="">`;
    }
    e.target.value = '';
  });

  // Android back button (popstate)
  window.addEventListener('popstate', (e) => {
    if (state.sidebarOpen) { closeSidebar(); return; }
    if (document.getElementById('bottomSheet').classList.contains('open')) { closeSheet(); return; }
    if (document.getElementById('dialogOverlay').classList.contains('show')) { closeDialog(); return; }

    if (state.pageHistory.length > 1) {
      state.pageHistory.pop();
      const prev = state.pageHistory[state.pageHistory.length - 1];
      state.currentPage = '';
      navigateTo(prev);
    } else {
      // Double back to exit
      const now = Date.now();
      if (now - state.backPressTime < 2000) {
        window.history.back();
      } else {
        state.backPressTime = now;
        showToast(t('pressBackAgain'));
        window.history.pushState({page:'home'}, '', '#home');
      }
    }
  });

  // Keyboard back for testing
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (state.sidebarOpen) closeSidebar();
      else if (document.getElementById('bottomSheet').classList.contains('open')) closeSheet();
      else if (document.getElementById('dialogOverlay').classList.contains('show')) closeDialog();
    }
  });
}

// ─── PWA MANIFEST (dynamic) ─────────────────────────────────
function createManifest() {
  const manifest = {
    name: 'El5al Films',
    short_name: 'El5al Films',
    description: 'Personal Movie & TV Series Library',
    start_url: './index.html',
    display: 'standalone',
    background_color: '#0B0B0B',
    theme_color: '#0B0B0B',
    icons: [{
      src: 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192"><rect width="192" height="192" rx="40" fill="#D4AF37"/><text x="96" y="115" text-anchor="middle" font-size="72" font-weight="800" fill="#0B0B0B" font-family="sans-serif">EF</text></svg>'),
      sizes: '192x192',
      type: 'image/svg+xml'
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
}

// ─── SERVICE WORKER (inline registration) ────────────────────
if ('serviceWorker' in navigator) {
  const swCode = `self.addEventListener('install',e=>self.skipWaiting());
    self.addEventListener('activate',e=>self.clients.claim());
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('Offline'))));
    });`;
  const swBlob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

// ─── START ───────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
