<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0B0B0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="El5al Films - Personal Offline Movie & TV Series Library">
  <title>El5al Films</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="header" role="banner">
    <div class="header-left">
      <button class="icon-btn" id="menu-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="header-title" id="header-title">El5al Films</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
      <button class="lang-btn" id="lang-btn" aria-label="Language">عر</button>
    </div>
  </header>

  <!-- ========== SIDEBAR OVERLAY ========== -->
  <div class="sidebar-overlay" id="sidebar-overlay" aria-hidden="true"></div>

  <!-- ========== SIDEBAR ========== -->
  <nav class="sidebar" id="sidebar" role="navigation" aria-label="Main Navigation">
    <div class="sidebar-header">
      <span class="sidebar-logo" id="sidebar-logo">El5al Films</span>
    </div>
    <div class="sidebar-nav">
      <button class="nav-item active" data-view="home" data-label-key="myLibrary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="nav-label">My Library</span>
      </button>
      <button class="nav-item" data-view="movies" data-label-key="movies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="2" y1="17" x2="7" y2="17"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/></svg>
        <span class="nav-label">Movies</span>
      </button>
      <button class="nav-item" data-view="tv" data-label-key="tvSeries">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="15" rx="2" ry="2"/><polyline points="17 2 12 7 7 2"/></svg>
        <span class="nav-label">TV Series</span>
      </button>
      <button class="nav-item" data-view="collections" data-label-key="collections">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
        <span class="nav-label">Collections</span>
      </button>
      <button class="nav-item" data-view="favorites" data-label-key="favorites">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
        <span class="nav-label">Favorites</span>
      </button>
      <button class="nav-item" data-view="watched" data-label-key="watched">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        <span class="nav-label">Watched</span>
      </button>
      <button class="nav-item" data-view="watchlist" data-label-key="watchlist">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <span class="nav-label">Watchlist</span>
      </button>
      <button class="nav-item" data-view="statistics" data-label-key="statistics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
        <span class="nav-label">Statistics</span>
      </button>
      <button class="nav-item" data-view="achievements" data-label-key="achievements">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
        <span class="nav-label">Achievements</span>
      </button>
      <button class="nav-item" data-view="settings" data-label-key="settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span class="nav-label">Settings</span>
      </button>
    </div>
    <div class="sidebar-footer">
      El5al Films &middot; v1.0
    </div>
  </nav>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main" role="main">

    <!-- Home -->
    <section class="view active" id="view-home" aria-label="My Library"></section>

    <!-- Movies -->
    <section class="view" id="view-movies" aria-label="Movies"></section>

    <!-- TV Series -->
    <section class="view" id="view-tv" aria-label="TV Series"></section>

    <!-- Collections -->
    <section class="view" id="view-collections" aria-label="Collections"></section>

    <!-- Favorites -->
    <section class="view" id="view-favorites" aria-label="Favorites"></section>

    <!-- Watched -->
    <section class="view" id="view-watched" aria-label="Watched"></section>

    <!-- Watchlist -->
    <section class="view" id="view-watchlist" aria-label="Watchlist"></section>

    <!-- Statistics -->
    <section class="view" id="view-statistics" aria-label="Statistics"></section>

    <!-- Achievements -->
    <section class="view" id="view-achievements" aria-label="Achievements"></section>

    <!-- Settings -->
    <section class="view" id="view-settings" aria-label="Settings"></section>

    <!-- Form (Add / Edit) -->
    <section class="view" id="view-form" aria-label="Add or Edit Title"></section>

    <!-- Detail -->
    <section class="view" id="view-detail" aria-label="Title Detail"></section>

    <!-- Collection Detail -->
    <section class="view" id="view-collectionDetail" aria-label="Collection Detail"></section>

    <!-- Global Search -->
    <section class="view" id="view-globalSearch" aria-label="Search"></section>

  </main>

  <!-- ========== FAB ========== -->
  <button class="fab" id="fab" aria-label="Add Title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  <!-- ========== TOAST CONTAINER ========== -->
  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <!-- ========== DIALOG ========== -->
  <div class="dialog-overlay" id="dialog-overlay" role="dialog" aria-modal="true">
    <div class="dialog"></div>
  </div>

  <!-- Scripts -->
  <script src="js/script.js"></script>
</body>
</html>
