<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>El5al Films</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================
   CSS RESET & ROOT VARIABLES
   ============================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0B0B0B;--card:#171717;--border:#2A2A2A;
  --accent:#D4AF37;--accent-dim:rgba(212,175,55,.15);
  --success:#4CAF50;--warning:#FFC107;--danger:#F44336;
  --text:#FFFFFF;--text2:#B3B3B3;--text3:#666;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --transition:250ms cubic-bezier(.4,0,.2,1);
  --font-en:'Inter',sans-serif;--font-ar:'Cairo',sans-serif;
  --header-h:60px;--sidebar-w:280px;
}
html{font-size:16px;scroll-behavior:smooth}
body{
  font-family:var(--font-en);background:var(--bg);color:var(--text);
  line-height:1.6;overflow-x:hidden;min-height:100vh;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
}
html[dir="rtl"] body{font-family:var(--font-ar)}
a{text-decoration:none;color:inherit}
button{border:none;background:none;cursor:pointer;font-family:inherit;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
img{display:block;max-width:100%}
ul,ol{list-style:none}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ============================================
   HEADER
   ============================================ */
.header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  height:var(--header-h);
  background:rgba(11,11,11,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.header-left,.header-right{display:flex;align-items:center;gap:8px}
.header-brand{
  font-size:1.1rem;font-weight:700;letter-spacing:.3px;
  display:flex;align-items:center;gap:9px;
}
.header-brand svg{color:var(--accent)}
.brand-mark{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,rgba(212,175,55,.22),rgba(212,175,55,.06));border:1px solid rgba(212,175,55,.25);color:var(--accent)}
.brand-mark svg{width:19px;height:19px}
.sidebar-brand-mark{display:flex;align-items:center;justify-content:center;width:40px;height:40px;flex-shrink:0;border-radius:10px;background:linear-gradient(135deg,rgba(212,175,55,.22),rgba(212,175,55,.06));border:1px solid rgba(212,175,55,.25);color:var(--accent)}
.sidebar-brand-mark svg{width:22px;height:22px}
.icon-btn{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:background var(--transition);
  position:relative;overflow:hidden;
}
.icon-btn:hover{background:rgba(255,255,255,.08)}
.icon-btn:active{background:rgba(255,255,255,.12)}
.icon-btn svg{width:20px;height:20px}

/* Ripple */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.15);
  transform:scale(0);animation:ripple-anim .5s ease-out;
  pointer-events:none;
}
@keyframes ripple-anim{to{transform:scale(4);opacity:0}}

/* ============================================
   SIDEBAR & OVERLAY
   ============================================ */
.sidebar-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.6);opacity:0;visibility:hidden;
  transition:opacity var(--transition),visibility var(--transition);
}
.sidebar-overlay.active{opacity:1;visibility:visible}

.sidebar{
  position:fixed;top:0;left:0;bottom:0;z-index:201;
  width:var(--sidebar-w);background:var(--card);
  border-right:1px solid var(--border);
  transform:translateX(-100%);transition:transform 300ms cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;overflow-y:auto;
}
html[dir="rtl"] .sidebar{
  left:auto;right:0;border-right:none;border-left:1px solid var(--border);
  transform:translateX(100%);
}
.sidebar.active{transform:translateX(0)}
html[dir="rtl"] .sidebar.active{transform:translateX(0)}

.sidebar-header{
  padding:20px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid var(--border);
}
.sidebar-header h2{font-size:1.15rem;font-weight:700}
.sidebar-header svg{color:var(--accent);flex-shrink:0}

.sidebar-nav{padding:12px 8px;flex:1}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:var(--radius-sm);
  font-size:.925rem;font-weight:500;color:var(--text2);
  transition:all var(--transition);margin-bottom:2px;
  position:relative;overflow:hidden;
}
.nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item svg{width:20px;height:20px;flex-shrink:0}

.sidebar-footer{
  padding:16px 20px;border-top:1px solid var(--border);
  font-size:.75rem;color:var(--text3);text-align:center;
}

/* ============================================
   MAIN CONTENT
   ============================================ */
.main{
  margin-top:var(--header-h);min-height:calc(100vh - var(--header-h));
  padding:16px;max-width:1200px;margin-left:auto;margin-right:auto;
}

/* View transitions */
.view{display:none;animation:fadeIn 250ms ease}
.view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ============================================
   CINEMA QUOTE - HERO
   ============================================ */
.hero-quote{
  position:relative;text-align:center;padding:34px 24px 28px;margin-bottom:22px;
  background:
    radial-gradient(120% 120% at 50% 0%,rgba(212,175,55,.14),rgba(212,175,55,.03) 55%,transparent 75%),
    linear-gradient(180deg,#161612,#131312);
  border:1px solid rgba(212,175,55,.18);border-radius:var(--radius-lg);
  overflow:hidden;
}
.hero-quote::before{
  content:'';position:absolute;inset:0;opacity:.5;pointer-events:none;
  background-image:radial-gradient(rgba(212,175,55,.5) 1px,transparent 1.6px);
  background-size:18px 18px;background-position:0 -40px;
  -webkit-mask-image:linear-gradient(180deg,#000,transparent 40%);
  mask-image:linear-gradient(180deg,#000,transparent 40%);
}
.hero-quote .hero-qicon{color:var(--accent);margin:0 auto 10px;display:flex;justify-content:center;position:relative}
.hero-quote .hero-qicon svg{width:30px;height:30px}
.hero-quote blockquote{
  font-size:1.08rem;font-weight:400;color:var(--text);
  font-style:italic;line-height:1.75;position:relative;
  letter-spacing:.1px;
}
html[dir="rtl"] .hero-quote blockquote{font-style:normal}
.hero-quote .hero-credit{margin-top:14px;font-size:.72rem;color:var(--accent);letter-spacing:2px;text-transform:uppercase;position:relative;font-weight:600}
.hero-quote .hero-refresh{
  position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;color:var(--text2);
  transition:all var(--transition);z-index:2;
}
html[dir="rtl"] .hero-quote .hero-refresh{right:auto;left:14px}
.hero-quote .hero-refresh:hover{color:var(--accent);border-color:var(--accent);transform:rotate(90deg)}
.hero-quote .hero-refresh svg{width:15px;height:15px}

/* ============================================
   WELCOME CARD
   ============================================ */
.welcome-card{
  position:relative;text-align:center;padding:44px 22px;margin-bottom:24px;
  background:
    radial-gradient(100% 100% at 50% 0%,rgba(212,175,55,.16),transparent 60%),
    var(--card);
  border:1px solid rgba(212,175,55,.22);border-radius:var(--radius-lg);overflow:hidden;
}
.welcome-card .welcome-illus{
  width:72px;height:72px;margin:0 auto 18px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;color:var(--accent);
  background:linear-gradient(135deg,rgba(212,175,55,.22),rgba(212,175,55,.05));
  border:1px solid rgba(212,175,55,.3);
}
.welcome-card .welcome-illus svg{width:36px;height:36px}
.welcome-card h2{font-size:1.4rem;font-weight:700;margin-bottom:8px}
.welcome-card p{color:var(--text2);margin:0 auto 26px;font-size:.95rem;max-width:320px;line-height:1.7}

/* ============================================
   HIGHLIGHT STAT CARDS (HOME)
   ============================================ */
.highlight-grid{
  display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px;
}
.highlight-card{
  position:relative;padding:18px;border-radius:var(--radius);
  background:var(--card);border:1px solid var(--border);overflow:hidden;
  transition:border-color var(--transition),transform var(--transition);
}
.highlight-card::before{
  content:'';position:absolute;inset:0;opacity:0;transition:opacity var(--transition);
  background:linear-gradient(135deg,var(--c-soft),transparent 60%);
}
.highlight-card:hover{border-color:var(--c);transform:translateY(-2px)}
.highlight-card:hover::before{opacity:.35}
.highlight-card .hl-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;position:relative}
.highlight-card .hl-icon{
  width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:var(--c-soft);color:var(--c);
}
.highlight-card .hl-icon svg{width:20px;height:20px}
.highlight-card .hl-value{font-size:1.7rem;font-weight:800;line-height:1;position:relative}
.highlight-card .hl-label{font-size:.78rem;color:var(--text2);margin-top:5px;position:relative;font-weight:500}

/* Mini stats strip */
.mini-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:22px;
}
.mini-stat{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:12px 8px;text-align:center;transition:border-color var(--transition);
}
.mini-stat:hover{border-color:var(--text3)}
.mini-stat .ms-value{font-size:1.15rem;font-weight:700}
.mini-stat .ms-label{font-size:.68rem;color:var(--text2);margin-top:3px}
.mini-stat .ms-icon{color:var(--accent);margin-bottom:4px;display:flex;justify-content:center}
.mini-stat .ms-icon svg{width:16px;height:16px}

/* Quick add button (home) */
.home-add{
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  width:100%;padding:16px 18px;margin-bottom:24px;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(212,175,55,.14),rgba(212,175,55,.04));
  border:1px solid rgba(212,175,55,.25);color:var(--text);
  transition:all var(--transition);text-align:left;
}
html[dir="rtl"] .home-add{text-align:right}
.home-add:hover{border-color:var(--accent);transform:translateY(-2px)}
.home-add .ha-left{display:flex;align-items:center;gap:12px}
.home-add .ha-icon{
  width:42px;height:42px;border-radius:11px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#000;
  background:var(--accent);
}
.home-add .ha-icon svg{width:22px;height:22px}
.home-add .ha-title{font-weight:700;font-size:.95rem}
.home-add .ha-sub{font-size:.75rem;color:var(--text2)}
.home-add .ha-arrow{color:var(--accent);flex-shrink:0}
html[dir="rtl"] .home-add .ha-arrow svg{transform:scaleX(-1)}
.home-add .ha-arrow svg{width:20px;height:20px}

/* ============================================
   BUTTONS
   ============================================ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:10px 20px;border-radius:var(--radius-sm);
  font-size:.9rem;font-weight:600;
  transition:all var(--transition);position:relative;overflow:hidden;
  white-space:nowrap;
}
.btn-primary{background:var(--accent);color:#000}
.btn-primary:hover{background:#c9a430;transform:translateY(-1px)}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--text3)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#d32f2f}
.btn-sm{padding:8px 14px;font-size:.825rem}
.btn-lg{padding:12px 28px;font-size:1rem}
.btn-icon{width:36px;height:36px;padding:0;border-radius:50%}
.btn-block{width:100%}

/* ============================================
   STAT CARDS
   ============================================ */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;margin-bottom:24px;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-align:center;transition:border-color var(--transition);
}
.stat-card:hover{border-color:var(--accent)}
.stat-card .stat-icon{
  width:36px;height:36px;margin:0 auto 8px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--accent-dim);color:var(--accent);
}
.stat-card .stat-icon svg{width:18px;height:18px}
.stat-card .stat-value{font-size:1.5rem;font-weight:700}
.stat-card .stat-label{font-size:.75rem;color:var(--text2);margin-top:2px}

/* ============================================
   SECTION HEADERS
   ============================================ */
.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;margin-top:4px;
}
.section-header h2{
  font-size:1.08rem;font-weight:700;display:flex;align-items:center;gap:9px;
}
.section-header h2::before{
  content:'';width:3px;height:17px;border-radius:2px;background:var(--accent);flex-shrink:0;
}
.section-header .see-all{
  font-size:.8rem;color:var(--accent);font-weight:600;
  display:flex;align-items:center;gap:3px;padding:5px 10px;border-radius:20px;
  background:var(--accent-dim);transition:all var(--transition);
}
.section-header .see-all:hover{background:rgba(212,175,55,.25)}
.section-header .see-all svg{width:14px;height:14px}
html[dir="rtl"] .section-header .see-all svg{transform:scaleX(-1)}
.section-title{font-size:1.25rem;font-weight:700;margin-bottom:18px}

/* ============================================
   MOVIE CARDS - GRID
   ============================================ */
.movies-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:14px;margin-bottom:28px;
}
.movie-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;
  transition:transform var(--transition),border-color var(--transition),box-shadow var(--transition);
}
.movie-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow)}
.movie-card .poster-wrap{
  position:relative;width:100%;padding-top:150%;background:#1a1a1a;overflow:hidden;
}
.movie-card .poster-wrap img{
  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  transition:transform var(--transition);
}
.movie-card:hover .poster-wrap img{transform:scale(1.05)}
.movie-card .poster-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;
  color:var(--text3);background:var(--card);
}
.movie-card .poster-placeholder svg{width:32px;height:32px;color:var(--border)}
.movie-card .card-info{padding:10px}
.movie-card .card-title{
  font-size:.85rem;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.movie-card .card-meta{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:4px;font-size:.75rem;color:var(--text2);
}
.movie-card .card-rating{color:var(--accent);display:flex;align-items:center;gap:2px}
.movie-card .card-rating svg{width:12px;height:12px}
.list-poster svg{width:20px;height:20px;color:var(--border)}
.movie-card .card-fav{
  position:absolute;top:8px;right:8px;z-index:2;
  width:28px;height:28px;border-radius:50%;
  background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;
}
.movie-card .card-fav svg{width:14px;height:14px;color:var(--danger)}

/* Status badge */
.status-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:20px;font-size:.7rem;font-weight:600;
}
.status-watched{background:rgba(76,175,80,.15);color:var(--success)}
.status-watchlist{background:rgba(255,193,7,.15);color:var(--warning)}

/* ============================================
   MOVIE CARDS - LIST
   ============================================ */
.movies-list{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.movie-list-item{
  display:flex;gap:12px;padding:12px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:border-color var(--transition);
}
.movie-list-item:hover{border-color:var(--accent)}
.movie-list-item .list-poster{
  width:60px;height:90px;border-radius:var(--radius-sm);overflow:hidden;
  flex-shrink:0;background:#1a1a1a;position:relative;
}
.movie-list-item .list-poster img{width:100%;height:100%;object-fit:cover}
.movie-list-item .list-info{flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px}
.movie-list-item .list-title{font-size:.9rem;font-weight:600}
.movie-list-item .list-meta{font-size:.8rem;color:var(--text2)}
.movie-list-item .list-right{display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:6px}
.movie-list-item .list-right svg{width:12px;height:12px}
.movie-list-item .card-rating{color:var(--accent);display:flex;align-items:center;gap:3px}

/* ============================================
   HORIZONTAL SCROLL
   ============================================ */
.h-scroll{
  display:flex;gap:12px;overflow-x:auto;
  padding-bottom:8px;margin-bottom:20px;
  scrollbar-width:none;-ms-overflow-style:none;
}
.h-scroll::-webkit-scrollbar{display:none}
.h-scroll .movie-card{min-width:150px;max-width:150px;flex-shrink:0}

/* ============================================
   FILTER BAR
   ============================================ */
.filter-bar{
  display:flex;align-items:center;gap:8px;
  margin-bottom:16px;overflow-x:auto;
  padding-bottom:4px;scrollbar-width:none;
}
.filter-bar::-webkit-scrollbar{display:none}
.filter-chip{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:20px;
  font-size:.8rem;font-weight:500;
  background:var(--card);border:1px solid var(--border);
  white-space:nowrap;transition:all var(--transition);flex-shrink:0;
}
.filter-chip:hover,.filter-chip.active{
  background:var(--accent-dim);border-color:var(--accent);color:var(--accent);
}
.filter-chip svg{width:14px;height:14px}

.view-toggle{display:flex;gap:4px;margin-left:auto}
html[dir="rtl"] .view-toggle{margin-left:0;margin-right:auto}
.view-toggle .icon-btn.active{background:var(--accent-dim);color:var(--accent)}

/* Search bar */
.search-bar{
  position:relative;margin-bottom:16px;
}
.search-bar input{
  width:100%;padding:10px 16px 10px 40px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  font-size:.9rem;color:var(--text);outline:none;
  transition:border-color var(--transition);
}
html[dir="rtl"] .search-bar input{padding:10px 40px 10px 16px}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--text3)}
.search-bar .search-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  color:var(--text3);pointer-events:none;
}
html[dir="rtl"] .search-bar .search-icon{left:auto;right:12px}
.search-bar .search-icon svg{width:18px;height:18px}

/* ============================================
   DETAIL VIEW
   ============================================ */
.detail-view{max-width:600px;margin:0 auto}
.detail-poster{
  width:200px;height:300px;margin:0 auto 20px;border-radius:var(--radius);
  overflow:hidden;box-shadow:var(--shadow);background:#1a1a1a;
}
.detail-poster img{width:100%;height:100%;object-fit:cover}
.detail-poster .poster-placeholder{
  width:100%;height:100%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;color:var(--text3);
}
.detail-poster .poster-placeholder svg{width:48px;height:48px;color:var(--border)}
.detail-title{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:4px}
.detail-subtitle{text-align:center;color:var(--text2);font-size:.9rem;margin-bottom:20px}
.detail-badges{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;margin-bottom:20px}
.detail-badge{
  padding:5px 12px;border-radius:20px;font-size:.8rem;font-weight:500;
  background:var(--card);border:1px solid var(--border);
  display:inline-flex;align-items:center;gap:4px;
}
.detail-badge svg{width:14px;height:14px}
.detail-info{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;
}
.detail-row{
  display:flex;justify-content:space-between;padding:10px 0;
  border-bottom:1px solid var(--border);
}
.detail-row:last-child{border-bottom:none}
.detail-row .label{color:var(--text2);font-size:.875rem}
.detail-row .value{font-weight:500;font-size:.875rem;text-align:right;max-width:60%}
html[dir="rtl"] .detail-row .value{text-align:left}
.detail-notes{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;margin-bottom:16px;
}
.detail-notes h3{font-size:.9rem;font-weight:600;margin-bottom:8px;color:var(--text2)}
.detail-notes p{font-size:.9rem;line-height:1.7}
.detail-actions{display:flex;gap:10px;margin-bottom:20px}

/* ============================================
   FORM
   ============================================ */
.form-view{max-width:600px;margin:0 auto}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:.85rem;font-weight:500;margin-bottom:6px;color:var(--text2)}
.form-label .required{color:var(--danger)}
.form-input,.form-select,.form-textarea{
  width:100%;padding:10px 14px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:.9rem;color:var(--text);outline:none;
  transition:border-color var(--transition);
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-input.error,.form-select.error,.form-textarea.error{border-color:var(--danger)}
.form-error{font-size:.75rem;color:var(--danger);margin-top:4px;display:none}
.form-error.show{display:block}
.form-select{appearance:none;cursor:pointer;
  background-image:url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%23B3B3B3' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
  background-repeat:no-repeat;background-position:right 14px center;
}
html[dir="rtl"] .form-select{background-position:left 14px center}
.form-select option{background:var(--card)}
.form-textarea{resize:vertical;min-height:80px}
.form-row{display:flex;gap:12px}
.form-row .form-group{flex:1}
.form-check{
  display:flex;align-items:center;gap:10px;cursor:pointer;
  padding:10px 14px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius-sm);transition:border-color var(--transition);
}
.form-check:hover{border-color:var(--text3)}
.form-check input[type="checkbox"]{display:none}
.form-check .checkmark{
  width:20px;height:20px;border:2px solid var(--border);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);flex-shrink:0;
}
.form-check input:checked ~ .checkmark{background:var(--accent);border-color:var(--accent)}
.form-check input:checked ~ .checkmark svg{display:block}
.form-check .checkmark svg{display:none;width:14px;height:14px;color:#000}
.form-check span{font-size:.9rem}

/* Image Upload */
.image-upload{
  border:2px dashed var(--border);border-radius:var(--radius);
  padding:30px 20px;text-align:center;cursor:pointer;
  transition:border-color var(--transition);position:relative;
}
.image-upload:hover{border-color:var(--accent)}
.image-upload.has-image{padding:0;border-style:solid}
.image-upload input{display:none}
.image-upload .upload-text{color:var(--text2);font-size:.875rem}
.image-upload .upload-text svg{width:32px;height:32px;color:var(--text3);margin:0 auto 8px}
.image-upload .preview-img{
  width:100%;max-height:300px;object-fit:contain;border-radius:var(--radius);
}
.image-upload .remove-img{
  position:absolute;top:8px;right:8px;
  width:28px;height:28px;border-radius:50%;
  background:var(--danger);color:#fff;
  display:flex;align-items:center;justify-content:center;
}
.form-actions{display:flex;gap:10px;margin-top:24px}

/* ============================================
   COLLECTIONS
   ============================================ */
.collections-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:14px;
}
.collection-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;cursor:pointer;transition:border-color var(--transition),transform var(--transition);
}
.collection-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.collection-mosaic{
  display:grid;grid-template-columns:1fr 1fr;height:140px;gap:2px;background:var(--border);
}
.collection-mosaic .mosaic-img{background:#1a1a1a;overflow:hidden}
.collection-mosaic .mosaic-img img{width:100%;height:100%;object-fit:cover}
.collection-mosaic .mosaic-placeholder{
  display:flex;align-items:center;justify-content:center;
  background:var(--card);color:var(--text3);
}
.collection-mosaic .mosaic-placeholder svg{width:20px;height:20px}
.collection-info{padding:12px}
.collection-info h3{font-size:.9rem;font-weight:600;margin-bottom:4px}
.collection-info .coll-meta{display:flex;justify-content:space-between;font-size:.8rem;color:var(--text2)}

/* ============================================
   STATISTICS
   ============================================ */
.stats-section{margin-bottom:24px}
.stats-section h2{font-size:1.1rem;font-weight:700;margin-bottom:12px}

.progress-ring{position:relative;width:100px;height:100px;margin:0 auto 12px}
.progress-ring svg{transform:rotate(-90deg)}
.progress-ring .ring-bg{stroke:var(--border);fill:none;stroke-width:6}
.progress-ring .ring-fill{fill:none;stroke-width:6;stroke-linecap:round;
  transition:stroke-dashoffset 1s ease}
.progress-ring .ring-text{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;font-weight:700;
}

.chart-bar-container{display:flex;flex-direction:column;gap:10px}
.chart-bar-row{display:flex;align-items:center;gap:10px}
.chart-bar-label{width:80px;font-size:.8rem;color:var(--text2);text-align:right;flex-shrink:0}
html[dir="rtl"] .chart-bar-label{text-align:left}
.chart-bar-track{flex:1;height:24px;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.chart-bar-fill{height:100%;border-radius:12px;transition:width 1s ease;
  display:flex;align-items:center;padding:0 8px;font-size:.7rem;font-weight:600;min-width:fit-content}

/* ============================================
   ACHIEVEMENTS
   ============================================ */
.achievements-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;
}
.achievement-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:16px;text-align:center;transition:all var(--transition);
}
.achievement-card.locked{opacity:.4}
.achievement-card.unlocked{border-color:var(--accent)}
.achievement-card .ach-icon{
  width:48px;height:48px;margin:0 auto 10px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:var(--accent-dim);font-size:1.5rem;
}
.achievement-card.locked .ach-icon{background:rgba(255,255,255,.05)}
.achievement-card .ach-title{font-size:.85rem;font-weight:600;margin-bottom:4px}
.achievement-card .ach-desc{font-size:.75rem;color:var(--text2);margin-bottom:6px}
.achievement-card .ach-date{font-size:.7rem;color:var(--accent)}

/* ============================================
   SETTINGS
   ============================================ */
.settings-section{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  margin-bottom:16px;overflow:hidden;
}
.settings-section-title{
  padding:14px 16px;font-size:.85rem;font-weight:600;color:var(--text2);
  text-transform:uppercase;letter-spacing:.5px;
}
.setting-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;border-top:1px solid var(--border);
}
.setting-item .setting-label{font-size:.9rem;font-weight:500}
.setting-item .setting-desc{font-size:.75rem;color:var(--text2);margin-top:2px}

/* Toggle Switch */
.toggle{
  width:44px;height:24px;border-radius:12px;
  background:var(--border);cursor:pointer;
  position:relative;transition:background var(--transition);flex-shrink:0;
}
.toggle.active{background:var(--accent)}
.toggle::after{
  content:'';position:absolute;width:20px;height:20px;
  border-radius:50%;background:#fff;top:2px;left:2px;
  transition:transform var(--transition);
}
.toggle.active::after{transform:translateX(20px)}

/* ============================================
   EMPTY STATE
   ============================================ */
.empty-state{
  text-align:center;padding:60px 20px;
}
.empty-state>svg{width:64px;height:64px;color:var(--text3);margin:0 auto 16px;display:block}
.empty-state>svg *{vector-effect:non-scaling-stroke}
.empty-state h3{font-size:1.1rem;font-weight:600;margin-bottom:8px}
.empty-state p{color:var(--text2);font-size:.9rem;margin-bottom:24px;max-width:300px;margin-left:auto;margin-right:auto}

/* ============================================
   TOAST
   ============================================ */
.toast-container{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:1000;display:flex;flex-direction:column;gap:8px;
  align-items:center;pointer-events:none;
}
.toast{
  padding:12px 20px;border-radius:var(--radius-sm);
  font-size:.875rem;font-weight:500;
  display:flex;align-items:center;gap:8px;
  pointer-events:auto;box-shadow:var(--shadow);
  animation:toastIn 300ms ease;min-width:200px;
}
.toast.success{background:var(--success);color:#fff}
.toast.warning{background:var(--warning);color:#000}
.toast.danger{background:var(--danger);color:#fff}
.toast.info{background:var(--accent);color:#000}
.toast.out{animation:toastOut 300ms ease forwards}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(20px)}}
.toast svg{width:18px;height:18px;flex-shrink:0}

/* ============================================
   DIALOG
   ============================================ */
.dialog-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;
  padding:20px;opacity:0;visibility:hidden;
  transition:opacity var(--transition),visibility var(--transition);
}
.dialog-overlay.active{opacity:1;visibility:visible}
.dialog{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:24px;max-width:380px;width:100%;
  transform:scale(.95);transition:transform var(--transition);
}
.dialog-overlay.active .dialog{transform:scale(1)}
.dialog h3{font-size:1.1rem;font-weight:700;margin-bottom:8px}
.dialog p{color:var(--text2);font-size:.9rem;margin-bottom:20px;line-height:1.6}
.dialog .dialog-actions{display:flex;gap:10px;justify-content:flex-end}
.dialog input{
  width:100%;padding:10px 14px;background:var(--bg);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  font-size:.9rem;color:var(--text);outline:none;margin-bottom:16px;
}
.dialog input:focus{border-color:var(--accent)}

/* ============================================
   RANDOM PICK
   ============================================ */
.random-pick-card{
  position:relative;text-align:center;padding:24px;margin-bottom:8px;margin-top:6px;
  background:
    radial-gradient(120% 120% at 50% 0%,rgba(212,175,55,.14),rgba(212,175,55,.03) 60%),
    var(--card);
  border:1px solid rgba(212,175,55,.2);border-radius:var(--radius-lg);overflow:hidden;
}
.random-pick-card .rp-icon{
  width:50px;height:50px;margin:0 auto 12px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;color:var(--accent);
  background:linear-gradient(135deg,rgba(212,175,55,.22),rgba(212,175,55,.05));
  border:1px solid rgba(212,175,55,.28);
}
.random-pick-card .rp-icon svg{width:26px;height:26px}
.random-pick-card h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.random-pick-card .rp-sub{font-size:.78rem;color:var(--text2);margin-bottom:16px}
.random-pick-result{
  margin-top:18px;padding:16px;border-radius:var(--radius);
  background:rgba(0,0,0,.25);border:1px solid var(--border);
  display:none;
}
.random-pick-result.show{display:block;animation:fadeIn 350ms ease}
.random-pick-result .rpr-inner{cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left}
html[dir="rtl"] .random-pick-result .rpr-inner{text-align:right}
.random-pick-result .rpr-poster{width:64px;height:96px;border-radius:8px;overflow:hidden;flex-shrink:0;background:#1a1a1a}
.random-pick-result .rpr-poster img{width:100%;height:100%;object-fit:cover}
.random-pick-result .rpr-title{font-weight:700;font-size:.95rem}
.random-pick-result .rpr-meta{color:var(--text2);font-size:.78rem;margin-top:4px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.random-pick-result .rpr-meta .pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:var(--border);font-size:.7rem}
.random-pick-result .rpr-meta .pill.gold{color:var(--accent)}

/* ============================================
   BACK BUTTON
   ============================================ */
.back-row{margin-bottom:16px}
.back-btn{
  display:inline-flex;align-items:center;gap:6px;
  font-size:.9rem;font-weight:500;color:var(--text2);
  transition:color var(--transition);
}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:18px;height:18px}
html[dir="rtl"] .back-btn svg{transform:scaleX(-1)}

/* ============================================
   SKELETON
   ============================================ */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,#222 50%,var(--card) 75%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:var(--radius-sm)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Sort dropdown */
.sort-dropdown{position:relative}
.sort-menu{
  position:absolute;top:100%;right:0;z-index:50;margin-top:4px;
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  min-width:180px;box-shadow:var(--shadow);
  opacity:0;visibility:hidden;transform:translateY(-4px);
  transition:all var(--transition);overflow:hidden;
}
html[dir="rtl"] .sort-menu{right:auto;left:0}
.sort-menu.active{opacity:1;visibility:visible;transform:translateY(0)}
.sort-option{
  padding:10px 14px;font-size:.85rem;display:block;width:100%;text-align:left;
  transition:background var(--transition);
}
html[dir="rtl"] .sort-option{text-align:right}
.sort-option:hover{background:rgba(255,255,255,.05)}
.sort-option.active{color:var(--accent)}

/* ============================================
   RESPONSIVE
   ============================================ */
@media(max-width:480px){
  .movies-grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .collections-grid{grid-template-columns:1fr}
  .form-row{flex-direction:column;gap:0}
  .detail-poster{width:160px;height:240px}
  .achievements-grid{grid-template-columns:repeat(2,1fr)}
  .h-scroll .movie-card{min-width:140px;max-width:140px}
  .filter-bar{padding-bottom:8px}
  .header-brand span{font-size:1rem}
  .highlight-grid{gap:10px}
  .highlight-card{padding:15px}
  .highlight-card .hl-value{font-size:1.5rem}
  .mini-stats{gap:7px}
  .mini-stat{padding:10px 6px}
  .mini-stat .ms-value{font-size:1.05rem}
  .hero-quote blockquote{font-size:1rem}
}
@media(max-width:360px){
  .movies-grid{grid-template-columns:repeat(2,1fr)}
  .stats-grid{grid-template-columns:repeat(2,1fr);gap:8px}
  .stat-card{padding:12px}
  .stat-card .stat-value{font-size:1.2rem}
  .mini-stats{grid-template-columns:repeat(3,1fr)}
  .highlight-card .hl-value{font-size:1.35rem}
}
@media(min-width:768px){
  .highlight-grid{grid-template-columns:repeat(4,1fr)}
  .mini-stats{grid-template-columns:repeat(6,1fr)}
  .hero-quote blockquote{font-size:1.25rem;max-width:640px;margin:0 auto}
}
@media(min-width:768px){
  .main{padding:20px 24px}
  .movies-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
  .collections-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
}
@media(min-width:1024px){
  .movies-grid{grid-template-columns:repeat(auto-fill,minmax(180px,1fr))}
}
</style>
</head>

      <span data-i18n="nav_home">My Library</span>

      <span data-i18n="nav_series">TV Series</span>

    <button class="nav-item" data-view="collections">

      <span data-i18n="nav_collections">Collections</span>
    </button>
    <button class="nav-item" data-view="favorites">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      <span data-i18n="nav_favorites">Favorites</span>
    </button>
    <button class="nav-item" data-view="watched">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span data-i18n="nav_watched">Watched</span>

    <button class="nav-item" data-view="watchlist">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span data-i18n="nav_watchlist">Watchlist</span>
    </button>
    <button class="nav-item" data-view="statistics">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      <span data-i18n="nav_statistics">Statistics</span>
    </button>
    <button class="nav-item" data-view="achievements">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
      <span data-i18n="nav_achievements">Achievements</span>

/* ============================================
   DATABASE LAYER - LocalStorage + IndexedDB
   ============================================ */
const DB = {
  STORE_KEY: 'el5al_titles',
  SETTINGS_KEY: 'el5al_settings',
  ACHIEVEMENTS_KEY: 'el5al_achievements',
  WELCOME_KEY: 'el5al_welcome_dismissed',
  dbName: 'El5alFilmsDB',
  storeName: 'posters',
  idb: null,

  // Initialize IndexedDB
  async initIDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open(this.dbName, 1);
      req.onupgradeneeded = (e) => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(this.storeName)) {
          db.createObjectStore(this.storeName);
        }
      };
      req.onsuccess = (e) => { this.idb = e.target.result; resolve(); };
      req.onerror = () => { console.warn('IndexedDB failed'); resolve(); };
    });
  },

  // Poster operations via IndexedDB
  async savePoster(id, blob) {
    if (!this.idb) return;
    return new Promise((resolve, reject) => {
      try {
        const tx = this.idb.transaction(this.storeName, 'readwrite');
        tx.objectStore(this.storeName).put(blob, id);
        tx.oncomplete = resolve;
        tx.onerror = () => resolve();
      } catch(e) { resolve(); }
    });
  },

  async getPoster(id) {
    if (!this.idb) return null;
    return new Promise((resolve) => {
      try {
        const tx = this.idb.transaction(this.storeName, 'readonly');
        const req = tx.objectStore(this.storeName).get(id);
        req.onsuccess = () => resolve(req.result || null);
        req.onerror = () => resolve(null);
      } catch(e) { resolve(null); }
    });
  },

  async deletePoster(id) {
    if (!this.idb) return;
    return new Promise((resolve) => {
      try {
        const tx = this.idb.transaction(this.storeName, 'readwrite');
        tx.objectStore(this.storeName).delete(id);
        tx.oncomplete = resolve;
        tx.onerror = () => resolve();
      } catch(e) { resolve(); }
    });
  },

  // Title operations via LocalStorage
  getTitles() {
    try {
      const data = localStorage.getItem(this.STORE_KEY);
      return data ? JSON.parse(data) : [];
    } catch(e) {
      console.warn('Corrupted LocalStorage, resetting.');
      localStorage.removeItem(this.STORE_KEY);
      return [];
    }
  },

  saveTitles(titles) {
    try { localStorage.setItem(this.STORE_KEY, JSON.stringify(titles)); }
    catch(e) { console.error('Failed to save titles'); }
  },

  addTitle(title) {
    const titles = this.getTitles();
    title.id = Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
    title.dateAdded = new Date().toISOString();
    titles.push(title);
    this.saveTitles(titles);
    return title;
  },

  updateTitle(id, updates) {
    const titles = this.getTitles();
    const idx = titles.findIndex(t => t.id === id);
    if (idx > -1) { Object.assign(titles[idx], updates); this.saveTitles(titles); }
    return titles[idx];
  },

  deleteTitle(id) {
    let titles = this.getTitles();
    titles = titles.filter(t => t.id !== id);
    this.saveTitles(titles);
    this.deletePoster(id);
  },

  getTitle(id) { return this.getTitles().find(t => t.id === id) || null; },

  // Settings
  getSettings() {
    try {
      const s = localStorage.getItem(this.SETTINGS_KEY);
      return s ? JSON.parse(s) : {};
    } catch(e) { return {}; }
  },
  saveSetting(key, val) {
    const s = this.getSettings();
    s[key] = val;
    localStorage.setItem(this.SETTINGS_KEY, JSON.stringify(s));
  },

  // Achievements
  getAchievements() {
    try {
      const a = localStorage.getItem(this.ACHIEVEMENTS_KEY);
      return a ? JSON.parse(a) : {};
    } catch(e) { return {}; }
  },
  saveAchievement(id) {
    const a = this.getAchievements();
    if (!a[id]) { a[id] = new Date().toISOString(); localStorage.setItem(this.ACHIEVEMENTS_KEY, JSON.stringify(a)); return true; }
    return false;
  },

  isWelcomeDismissed() { return localStorage.getItem(this.WELCOME_KEY) === 'true'; },
  dismissWelcome() { localStorage.setItem(this.WELCOME_KEY, 'true'); },

  clearAll() {
    localStorage.removeItem(this.STORE_KEY);
    localStorage.removeItem(this.SETTINGS_KEY);
    localStorage.removeItem(this.ACHIEVEMENTS_KEY);
    localStorage.removeItem(this.WELCOME_KEY);
    if (this.idb) {
      try {
        const tx = this.idb.transaction(this.storeName, 'readwrite');
        tx.objectStore(this.storeName).clear();
      } catch(e) {}
    }
  }
};

/* ============================================
   IMAGE PROCESSOR - Compress & Convert
   ============================================ */
const ImageProcessor = {
  MAX_W: 300, MAX_H: 450, QUALITY: 0.75,

  async processFile(file) {
    const validTypes = ['image/jpeg','image/png','image/webp','image/gif','image/bmp'];
    if (!validTypes.includes(file.type)) throw new Error('unsupported');
    if (file.size > 5 * 1024 * 1024) throw new Error('too_large');

    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          // Scale to fit within MAX dimensions
          if (w > this.MAX_W || h > this.MAX_H) {
            const ratio = Math.min(this.MAX_W / w, this.MAX_H / h);
            w = Math.round(w * ratio);
            h = Math.round(h * ratio);
          }
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob((blob) => {
            if (blob) resolve(blob);
            else reject(new Error('processing'));
          }, 'image/webp', this.QUALITY);
        };
        img.onerror = () => reject(new Error('invalid'));
        img.src = e.target.result;
      };
      reader.onerror = () => reject(new Error('read'));
      reader.readAsDataURL(file);
    });
  },

  blobToDataURL(blob) {
    return new Promise((resolve) => {
      const r = new FileReader();
      r.onload = () => resolve(r.result);
      r.readAsDataURL(blob);
    });
  }
};

/* ============================================
   DIALOG SYSTEM
   ============================================ */
const Dialog = {
  show(options) {
    const overlay = document.getElementById('dialogOverlay');
    const box = document.getElementById('dialogBox');
    let html = `<h3>${options.title || ''}</h3>`;
    if (options.message) html += `<p>${options.message}</p>`;
    if (options.input) html += `<input type="text" id="dialogInput" placeholder="${options.inputPlaceholder || ''}" autocomplete="off">`;
    html += `<div class="dialog-actions">`;
    if (options.cancelText) html += `<button class="btn btn-secondary btn-sm" id="dialogCancel">${options.cancelText}</button>`;
    if (options.confirmText) html += `<button class="btn ${options.danger ? 'btn-danger' : 'btn-primary'} btn-sm" id="dialogConfirm">${options.confirmText}</button>`;
    html += `</div>`;
    box.innerHTML = html;
    overlay.classList.add('active');

    return new Promise((resolve) => {
      const close = (val) => { overlay.classList.remove('active'); resolve(val); };
      const cancelBtn = document.getElementById('dialogCancel');
      const confirmBtn = document.getElementById('dialogConfirm');
      if (cancelBtn) cancelBtn.onclick = () => close(false);
      if (confirmBtn) confirmBtn.onclick = () => {
        if (options.input) {
          const v = document.getElementById('dialogInput').value.trim();
          close(v);
        } else close(true);
      };
      overlay.onclick = (e) => { if (e.target === overlay) close(false); };
      const onKey = (e) => { if (e.key === 'Escape') { close(false); document.removeEventListener('keydown', onKey); }};
      document.addEventListener('keydown', onKey);
    });
  }
};

/* ============================================
   UTILITY FUNCTIONS
   ============================================ */
const t = (key) => TRANSLATIONS[App.currentLang][key] || TRANSLATIONS.en[key] || key;

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (App.currentLang === 'ar') {
    return d.toLocaleDateString('ar-EG', { year: 'numeric', month: 'long', day: 'numeric' });
  }
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
}

function genreLabel(g) {
  if (!g) return '';
  const key = 'genre_' + g;
  return t(key);
}

function statusLabel(s) {
  if (s === 'watched') return t('status_watched');
  if (s === 'watchlist') return t('status_watchlist');
  return t('status_none');
}

function createRipple(e, el) {
  const r = document.createElement('span');
  r.className = 'ripple';
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + 'px';
  r.style.left = (e.clientX - rect.left - size / 2) + 'px';
  r.style.top = (e.clientY - rect.top - size / 2) + 'px';
  el.appendChild(r);
  setTimeout(() => r.remove(), 500);
}

// Poster URL cache
const posterCache = {};
async function getPosterURL(id) {
  if (posterCache[id]) return posterCache[id];
  const blob = await DB.getPoster(id);
  if (!blob) return null;
  const url = URL.createObjectURL(blob);
  posterCache[id] = url;
  return url;
}

function clearPosterCache() {
  Object.values(posterCache).forEach(url => URL.revokeObjectURL(url));
  Object.keys(posterCache).forEach(k => delete posterCache[k]);
}

const Sidebar = {
  open() {
    document.getElementById('sidebar').classList.add('active');
    document.getElementById('sidebarOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  },
  close() {
    document.getElementById('sidebar').classList.remove('active');
    document.getElementById('sidebarOverlay').classList.remove('active');
    document.body.style.overflow = '';
  },
  init() {
    document.getElementById('menuBtn').addEventListener('click', () => this.open());
    document.getElementById('sidebarOverlay').addEventListener('click', () => this.close());
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') this.close(); });

    document.getElementById('sidebarNav').addEventListener('click', (e) => {
      const item = e.target.closest('.nav-item');
      if (!item) return;
      const view = item.dataset.view;
      if (view) {
        Router.navigate(view);
        this.close();
      }
    });
  }
};

/* ============================================
   ROUTER
   ============================================ */
const Router = {
  navigate(view, data) {
    // Push to history for back navigation
    if (App.currentView !== view) {
      App.viewHistory.push(App.currentView);
    }
    App.currentView = view;
    if (data) Object.assign(App, data);

    // Update nav items
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.view === view);
    });

    // Render
    Renderer.render(view);
    window.scrollTo(0, 0);
  },
  back() {
    const prev = App.viewHistory.pop() || 'home';
    App.currentView = prev;
    document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === prev));
    Renderer.render(prev);
    window.scrollTo(0, 0);
  }
};

        <button class="filter-chip ${App.filterState.lang==='all'?'active':''}" data-filter="lang" data-val="all">${t('filter_all')}</button>
        <button class="filter-chip ${App.filterState.lang==='arabic'?'active':''}" data-filter="lang" data-val="arabic">${t('filter_arabic')}</button>
        <button class="filter-chip ${App.filterState.lang==='foreign'?'active':''}" data-filter="lang" data-val="foreign">${t('filter_foreign')}</button>
        <button class="filter-chip ${App.filterState.fav?'active':''}" data-filter="fav" data-val="toggle">${t('filter_favorite')}</button>
        <button class="filter-chip ${App.filterState.status==='watched'?'active':''}" data-filter="status" data-val="watched">${t('filter_watched')}</button>
        <button class="filter-chip ${App.filterState.status==='watchlist'?'active':''}" data-filter="status" data-val="watchlist">${t('filter_watchlist')}</button>
      </div>`;

      // Sort + View toggle
      html += `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="sort-dropdown">
          <button class="btn btn-secondary btn-sm" id="sortBtn">${ICONS.sort} ${this.sortLabel()}</button>
          <div class="sort-menu" id="sortMenu">
            ${['newest','oldest','rating_high','rating_low','az','za'].map(s =>
              `<button class="sort-option ${App.sortState===s?'active':''}" data-sort="${s}">${t('sort_'+s)}</button>`
            ).join('')}
          </div>
        </div>
        <div class="view-toggle">
          <button class="icon-btn ${App.viewMode==='grid'?'active':''}" data-mode="grid" aria-label="Grid">${ICONS.grid}</button>
          <button class="icon-btn ${App.viewMode==='list'?'active':''}" data-mode="list" aria-label="List">${ICONS.list}</button>
        </div>
      </div>`;

      html += `<div id="titlesContainer"></div>`;
    }

    html += '</div>';
    container.innerHTML = html;

    if (allTitles.length > 0) {
      this.bindTitleListEvents(container, type);
      await this.filterAndRenderTitles(type);
    }
  },

  sortLabel() {
    const map = {newest:'sort_newest',oldest:'sort_oldest',rating_high:'sort_rating_high',rating_low:'sort_rating_low',az:'sort_az',za:'sort_za'};
    return t(map[App.sortState]||'sort_newest');
  },

  bindTitleListEvents(container, type) {
    // Search
    const searchInput = container.querySelector('#titleSearch');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        App.searchQuery = e.target.value;
        this.filterAndRenderTitles(type);
      });
    }

    // Filters
    const filterBar = container.querySelector('#filterBar');
    if (filterBar) {
      filterBar.addEventListener('click', (e) => {
        const chip = e.target.closest('.filter-chip');
        if (!chip) return;
        const f = chip.dataset.filter;
        const v = chip.dataset.val;
        if (f === 'lang') App.filterState.lang = App.filterState.lang === v && v !== 'all' ? 'all' : v;
        else if (f === 'fav') App.filterState.fav = !App.filterState.fav;
        else if (f === 'status') App.filterState.status = App.filterState.status === v ? 'all' : v;
        this.filterAndRenderTitles(type);
        // Update chip states
        filterBar.querySelectorAll('.filter-chip').forEach(c => {
          const cf = c.dataset.filter, cv = c.dataset.val;
          if (cf === 'lang') c.classList.toggle('active', App.filterState.lang === cv);
          else if (cf === 'fav') c.classList.toggle('active', App.filterState.fav);
          else if (cf === 'status') c.classList.toggle('active', App.filterState.status === cv);
        });
      });
    }

    // Sort
    const sortBtn = container.querySelector('#sortBtn');
    const sortMenu = container.querySelector('#sortMenu');
    if (sortBtn && sortMenu) {
      sortBtn.addEventListener('click', () => sortMenu.classList.toggle('active'));
      sortMenu.addEventListener('click', (e) => {
        const opt = e.target.closest('.sort-option');
        if (!opt) return;
        App.sortState = opt.dataset.sort;
        sortMenu.classList.remove('active');
        sortBtn.innerHTML = `${ICONS.sort} ${this.sortLabel()}`;
        sortMenu.querySelectorAll('.sort-option').forEach(o => o.classList.toggle('active', o.dataset.sort === App.sortState));
        this.filterAndRenderTitles(type);
      });
      document.addEventListener('click', (e) => { if (!sortBtn.contains(e.target) && !sortMenu.contains(e.target)) sortMenu.classList.remove('active'); });
    }

    // View toggle
    container.querySelectorAll('.view-toggle .icon-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        App.viewMode = btn.dataset.mode;
        container.querySelectorAll('.view-toggle .icon-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === App.viewMode));
        this.filterAndRenderTitles(type);
      });
    });
  },

  async filterAndRenderTitles(type) {
    let items = DB.getTitles().filter(x => x.type === type);

    // Apply filters
    if (App.filterState.lang !== 'all') items = items.filter(x => x.language === App.filterState.lang);
    if (App.filterState.fav) items = items.filter(x => x.favorite);
    if (App.filterState.status !== 'all') items = items.filter(x => x.status === App.filterState.status);

    // Search
    if (App.searchQuery.trim()) {
      const q = App.searchQuery.trim().toLowerCase();
      items = items.filter(x =>
        (x.title||'').toLowerCase().includes(q) ||
        (x.collection||'').toLowerCase().includes(q) ||
        (x.genre||'').toLowerCase().includes(q) ||
        (x.notes||'').toLowerCase().includes(q)
      );
    }

    // Sort
    switch (App.sortState) {
      case 'newest': items.sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded)); break;
      case 'oldest': items.sort((a,b)=>new Date(a.dateAdded)-new Date(b.dateAdded)); break;
      case 'rating_high': items.sort((a,b)=>(b.rating||0)-(a.rating||0)); break;
      case 'rating_low': items.sort((a,b)=>(a.rating||0)-(b.rating||0)); break;
      case 'az': items.sort((a,b)=>a.title.localeCompare(b.title)); break;
      case 'za': items.sort((a,b)=>b.title.localeCompare(a.title)); break;
    }

    const cont = document.getElementById('titlesContainer');
    if (!cont) return;

    if (items.length === 0) {
      cont.innerHTML = this.emptyState(ICONS.search, App.searchQuery ? (App.currentLang==='ar'?'لا توجد نتائج':'No results found.') : t(`empty_${type==='movie'?'movies':'series'}`), '', null);
      return;
    }

    if (App.viewMode === 'grid') {
      cont.innerHTML = `<div class="movies-grid">${items.map(m => this.movieCard(m)).join('')}</div>`;
    } else {
      cont.innerHTML = `<div class="movies-list">${items.map(m => this.movieListItem(m)).join('')}</div>`;
    }
    await this.loadPosters(cont);
  },

  /* ---- FILTERED VIEWS (Favorites, Watched, Watchlist) ---- */
  async renderFiltered(container, filterType) {
    const titles = DB.getTitles();
    let items;
    let emptyMsg, emptyDesc, pageTitle;

    if (filterType === 'favorites') {
      items = titles.filter(x => x.favorite);
      pageTitle = t('nav_favorites'); emptyMsg = t('empty_favorites'); emptyDesc = t('empty_favorites_desc');
    } else if (filterType === 'watched') {
      items = titles.filter(x => x.status === 'watched');
      pageTitle = t('nav_watched'); emptyMsg = t('empty_watched'); emptyDesc = t('empty_watched_desc');
    } else {
      items = titles.filter(x => x.status === 'watchlist');
      pageTitle = t('nav_watchlist'); emptyMsg = t('empty_watchlist'); emptyDesc = t('empty_watchlist_desc');
    }

    items.sort((a,b) => new Date(b.dateAdded) - new Date(a.dateAdded));

    let html = `<div class="view active"><h1 class="section-title">${pageTitle}</h1>`;
    if (items.length === 0) {
      html += this.emptyState(filterType==='favorites'?ICONS.heart:filterType==='watched'?ICONS.eye:ICONS.clock, emptyMsg, emptyDesc, null);
    } else {
      html += `<div class="movies-grid">${items.map(m => this.movieCard(m)).join('')}</div>`;
    }
    html += '</div>';
    container.innerHTML = html;
    await this.loadPosters(container);
  },

  /* ---- COLLECTIONS ---- */
  async renderCollections(container) {
    const titles = DB.getTitles();
    const collMap = {};
    titles.forEach(t => { if (t.collection) { if (!collMap[t.collection]) collMap[t.collection] = []; collMap[t.collection].push(t); }});
    const collNames = Object.keys(collMap);

    let html = `<div class="view active"><h1 class="section-title">${t('nav_collections')}</h1>`;

    if (collNames.length === 0) {
      html += this.emptyState(ICONS.book, t('empty_collections'), t('empty_collections_desc'), null);
    } else {
      html += `<div class="collections-grid">`;
      for (const name of collNames) {
        const items = collMap[name];
        const avg = items.filter(x=>x.rating>0).length ? (items.filter(x=>x.rating>0).reduce((a,b)=>a+b.rating,0)/items.filter(x=>x.rating>0).length).toFixed(1) : '-';
        html += `<div class="collection-card" onclick="App.collectionName='${name.replace(/'/g,"\\'")}';Router.navigate('collectionDetail')">
          <div class="collection-mosaic">
            ${[0,1,2,3].map(i => items[i] ?
              `<div class="mosaic-img"><img data-poster-id="${items[i].id}" src="" alt="" style="display:none"><div class="mosaic-placeholder">${items[i].type==='movie'?ICONS.film:ICONS.tv}</div></div>` :
              `<div class="mosaic-placeholder">${ICONS.image}</div>`
            ).join('')}
          </div>
          <div class="collection-info">
            <h3>${name}</h3>
            <div class="coll-meta"><span>${items.length} ${t('collection_titles')}</span><span>${t('collection_avg')}: ${avg}</span></div>
          </div>
        </div>`;
      }
      html += `</div>`;
    }
    html += '</div>';
    container.innerHTML = html;
    await this.loadPosters(container);
  },

  /* ---- COLLECTION DETAIL ---- */
  async renderCollectionDetail(container) {
    const name = App.collectionName;
    const items = DB.getTitles().filter(x => x.collection === name);
    const avg = items.filter(x=>x.rating>0).length ? (items.filter(x=>x.rating>0).reduce((a,b)=>a+b.rating,0)/items.filter(x=>x.rating>0).length).toFixed(1) : '-';
    const watched = items.filter(x=>x.status==='watched').length;
    const progress = items.length ? Math.round((watched/items.length)*100) : 0;

    let html = `<div class="view active">
      <div class="back-row"><button class="back-btn" onclick="Router.back()">${ICONS.back} ${t('back')}</button></div>
      <h1 class="section-title">${name}</h1>
      <div class="stats-grid" style="margin-bottom:20px">
        ${this.statCard(ICONS.barChart, items.length, t('stat_total'))}
        ${this.statCard(ICONS.star, avg, t('stat_avg_rating'))}
        ${this.statCard(ICONS.eye, progress+'%', t('stat_watched'))}
      </div>
      <div class="movies-grid">${items.map(m => this.movieCard(m)).join('')}</div>
    </div>`;
    container.innerHTML = html;
    await this.loadPosters(container);
  },

            <label class="form-label">${t('form_genre')}</label>

        </div>

      const status = document.getElementById('fStatus').value;
      const favorite = document.getElementById('fFavorite').checked;
      const notes = document.getElementById('fNotes').value.trim();

      // Validation
      let valid = true;
      const titleErr = document.getElementById('fTitleError');
      const yearErr = document.getElementById('fYearError');

      if (!title) {
        titleErr.textContent = t('validation_title');
        titleErr.classList.add('show');
        document.getElementById('fTitle').classList.add('error');
        valid = false;
      } else {
        // Check duplicate
        const allTitles = DB.getTitles();
        const dup = allTitles.find(x => x.title.toLowerCase() === title.toLowerCase() && x.type === type && x.id !== App.editingId);
        if (dup) {
          titleErr.textContent = t('validation_duplicate');
          titleErr.classList.add('show');
          document.getElementById('fTitle').classList.add('error');
          valid = false;
        } else {
          titleErr.classList.remove('show');
          document.getElementById('fTitle').classList.remove('error');
        }
      }

      if (year && (year < 1900 || year > 2099)) {
        yearErr.textContent = t('validation_year');
        yearErr.classList.add('show');
        document.getElementById('fYear').classList.add('error');
        valid = false;
      } else {
        yearErr.classList.remove('show');
        document.getElementById('fYear').classList.remove('error');
      }

      if (!valid) return;

      const titleData = { title, type, language, genre, collection, year: year || null, rating, status, favorite, notes };

      if (isEdit) {
        DB.updateTitle(App.editingId, titleData);
        // Handle poster
        if (App.tempPosterBlob) {
          await DB.savePoster(App.editingId, App.tempPosterBlob);
          if (posterCache[App.editingId]) URL.revokeObjectURL(posterCache[App.editingId]);
          delete posterCache[App.editingId];
        } else if (App.removePoster) {
          await DB.deletePoster(App.editingId);
          if (posterCache[App.editingId]) URL.revokeObjectURL(posterCache[App.editingId]);
          delete posterCache[App.editingId];
        }
        Toast.show(t('toast_updated'), 'success');
      } else {
        const newTitle = DB.addTitle(titleData);
        if (App.tempPosterBlob) await DB.savePoster(newTitle.id, App.tempPosterBlob);
        DB.dismissWelcome();
        Toast.show(t('toast_added'), 'success');
      }

      App.tempPoster = null;
      App.tempPosterBlob = null;
      App.removePoster = false;
      Achievements.check();
      Router.back();
    });
  },

  /* ---- STATISTICS ---- */
  renderStatistics(container) {
    const titles = DB.getTitles();
    let html = `<div class="view active"><h1 class="section-title">${t('nav_statistics')}</h1>`;

    if (titles.length === 0) {
      html += this.emptyState(ICONS.barChart, t('empty_statistics'), t('empty_statistics_desc'), null);
    } else {
      const movies = titles.filter(x=>x.type==='movie').length;
      const series = titles.filter(x=>x.type==='series').length;
      const arabic = titles.filter(x=>x.language==='arabic').length;
      const foreign = titles.filter(x=>x.language==='foreign').length;
      const favs = titles.filter(x=>x.favorite).length;
      const watched = titles.filter(x=>x.status==='watched').length;
      const wlist = titles.filter(x=>x.status==='watchlist').length;
      const colls = new Set(titles.filter(x=>x.collection).map(x=>x.collection));
      const rated = titles.filter(x=>x.rating>0);
      const avgR = rated.length ? (rated.reduce((a,b)=>a+b.rating,0)/rated.length).toFixed(1) : '0';
      const now = new Date();
      const monthly = titles.filter(x=>{const d=new Date(x.dateAdded);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear()}).length;
      const yearly = titles.filter(x=>new Date(x.dateAdded).getFullYear()===now.getFullYear()).length;

      // Genre breakdown
      const genreCounts = {};
      titles.forEach(x=>{if(x.genre){genreCounts[x.genre]=(genreCounts[x.genre]||0)+1}});
      const topGenre = Object.keys(genreCounts).sort((a,b)=>genreCounts[b]-genreCounts[a])[0];
      const maxGenreCount = Math.max(...Object.values(genreCounts), 1);

      // Largest collection
      const collCounts = {};
      titles.forEach(x=>{if(x.collection){collCounts[x.collection]=(collCounts[x.collection]||0)+1}});
      const largestColl = Object.keys(collCounts).sort((a,b)=>collCounts[b]-collCounts[a])[0];

      // Newest / Oldest
      const sorted = [...titles].sort((a,b)=>new Date(b.dateAdded)-new Date(a.dateAdded));
      const newest = sorted[0];
      const oldest = sorted[sorted.length-1];

      // Overview
      html += `<div class="stats-section"><h2>${t('stats_overview')}</h2>
        <div class="stats-grid">
          ${this.statCard(ICONS.barChart, titles.length, t('stat_total'))}
          ${this.statCard(ICONS.film, movies, t('stat_movies'))}
          ${this.statCard(ICONS.tv, series, t('stat_series'))}
          ${this.statCard(ICONS.globe, arabic, t('stat_arabic'))}
          ${this.statCard(ICONS.globe, foreign, t('stat_foreign'))}
          ${this.statCard(ICONS.heart, favs, t('stat_favorites'))}
          ${this.statCard(ICONS.eye, watched, t('stat_watched'))}
          ${this.statCard(ICONS.clock, wlist, t('stat_watchlist'))}
          ${this.statCard(ICONS.book, colls.size, t('stat_collections'))}
          ${this.statCard(ICONS.star, avgR, t('stat_avg_rating'))}
          ${this.statCard(ICONS.calendar, monthly, t('stats_monthly'))}
          ${this.statCard(ICONS.calendar, yearly, t('stats_yearly'))}
        </div>
      </div>`;

      // Type breakdown (progress ring)
      const moviePct = titles.length ? Math.round((movies/titles.length)*100) : 0;
      const circumference = 2 * Math.PI * 42;
      html += `<div class="stats-section"><h2>${t('stats_breakdown')}</h2>
        <div style="display:flex;gap:20px;justify-content:center;flex-wrap:wrap">
          <div style="text-align:center">
            <div class="progress-ring">
              <svg width="100" height="100" viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="42"/>
                <circle class="ring-fill" cx="50" cy="50" r="42" stroke="var(--accent)"
                  stroke-dasharray="${circumference}" stroke-dashoffset="${circumference - (moviePct/100)*circumference}"/>
              </svg>
              <div class="ring-text">${moviePct}%</div>
            </div>
            <div style="font-size:.85rem;font-weight:600">${t('stat_movies')}</div>
          </div>
          <div style="text-align:center">
            <div class="progress-ring">
              <svg width="100" height="100" viewBox="0 0 100 100">
                <circle class="ring-bg" cx="50" cy="50" r="42"/>
                <circle class="ring-fill" cx="50" cy="50" r="42" stroke="var(--success)"
                  stroke-dasharray="${circumference}" stroke-dashoffset="${circumference - ((100-moviePct)/100)*circumference}"/>
              </svg>
              <div class="ring-text">${100-moviePct}%</div>
            </div>
            <div style="font-size:.85rem;font-weight:600">${t('stat_series')}</div>
          </div>
        </div>
      </div>`;

      // Genre chart
      if (Object.keys(genreCounts).length) {
        const colors = ['#D4AF37','#4CAF50','#2196F3','#FF5722','#9C27B0','#00BCD4','#FF9800','#E91E63','#607D8B','#795548','#3F51B5','#8BC34A','#CDDC39','#FFC107','#F44336','#009688','#673AB7'];
        html += `<div class="stats-section"><h2>${t('stats_genres')}</h2>
          <div class="chart-bar-container">
            ${Object.keys(genreCounts).sort((a,b)=>genreCounts[b]-genreCounts[a]).map((g,i) => {
              const pct = Math.round((genreCounts[g]/maxGenreCount)*100);
              return `<div class="chart-bar-row">
                <div class="chart-bar-label">${genreLabel(g)}</div>
                <div class="chart-bar-track"><div class="chart-bar-fill" style="width:${pct}%;background:${colors[i%colors.length]}">${genreCounts[g]}</div></div>
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }

      // Extra stats
      html += `<div class="stats-section"><div class="stats-grid">
        ${topGenre ? this.statCard(ICONS.tag, genreLabel(topGenre), t('stats_highest_genre')) : ''}
        ${largestColl ? this.statCard(ICONS.book, largestColl, t('stats_longest_coll')) : ''}
        ${newest ? this.statCard(ICONS.calendar, newest.title.slice(0,15), t('stats_newest_title')) : ''}
        ${oldest ? this.statCard(ICONS.calendar, oldest.title.slice(0,15), t('stats_oldest_title')) : ''}
      </div></div>`;
    }

    html += '</div>';
    container.innerHTML = html;
  },

  /* ---- ACHIEVEMENTS ---- */
  renderAchievements(container) {
    const titles = DB.getTitles();
    const unlocked = DB.getAchievements();
    const names = ACHIEVEMENT_NAMES[App.currentLang];

    let html = `<div class="view active"><h1 class="section-title">${t('nav_achievements')}</h1>
      <div class="achievements-grid">`;

    ACHIEVEMENT_DEFS.forEach(def => {
      const isUnlocked = !!unlocked[def.id];
      const info = names[def.id];
      html += `<div class="achievement-card ${isUnlocked?'unlocked':'locked'}">
        <div class="ach-icon">${def.icon}</div>
        <div class="ach-title">${info.t}</div>
        <div class="ach-desc">${info.d}</div>
        ${isUnlocked ? `<div class="ach-date">${formatDate(unlocked[def.id])}</div>` : ''}
      </div>`;
    });

    html += `</div></div>`;
    container.innerHTML = html;
  },

  /* ---- SETTINGS ---- */
  renderSettings(container) {
    const settings = DB.getSettings();

    let html = `<div class="view active"><h1 class="section-title">${t('nav_settings')}</h1>`;

    // General
    html += `<div class="settings-section">
      <div class="settings-section-title">${t('settings_general')}</div>
      <div class="setting-item">
        <div><div class="setting-label">${t('settings_language')}</div><div class="setting-desc">${App.currentLang==='en'?'English':'العربية'}</div></div>
        <button class="btn btn-secondary btn-sm" id="settingsLangBtn">${App.currentLang==='en'?'العربية':'English'}</button>
      </div>
    </div>`;

    // Appearance
    html += `<div class="settings-section">
      <div class="settings-section-title">${t('settings_appearance')}</div>
      <div class="setting-item">
        <div class="setting-label">${t('settings_grid_default')}</div>
        <div class="toggle ${App.viewMode==='grid'?'active':''}" id="toggleGrid"></div>
      </div>
      <div class="setting-item">
        <div class="setting-label">${t('settings_animations')}</div>
        <div class="toggle ${settings.animations!==false?'active':''}" id="toggleAnimations"></div>
      </div>
    </div>`;

    // About
    html += `<div class="settings-section">
      <div class="settings-section-title">${t('settings_about')}</div>
      <div class="setting-item"><div class="setting-label">${t('settings_app')}</div><div style="color:var(--text2);font-size:.85rem">El5al Films</div></div>
      <div class="setting-item"><div class="setting-label">Version</div><div style="color:var(--text2);font-size:.85rem">1.0.0</div></div>
      <div class="setting-item" style="border-top:none;padding-top:0"><div style="color:var(--text2);font-size:.85rem;line-height:1.6">${t('settings_about_text')}</div></div>
    </div>`;

    // Danger Zone
    html += `<div class="settings-section" style="border-color:var(--danger)">
      <div class="settings-section-title" style="color:var(--danger)">${t('settings_danger')}</div>
      <div class="setting-item">
        <div><div class="setting-label">${t('settings_clear_all')}</div><div class="setting-desc">${t('settings_clear_desc')}</div></div>
        <button class="btn btn-danger btn-sm" id="clearAllBtn">${t('settings_clear_btn')}</button>
      </div>
    </div>`;

    html += '</div>';
    container.innerHTML = html;

    // Bind events
    document.getElementById('settingsLangBtn').addEventListener('click', () => {
      const newLang = App.currentLang === 'en' ? 'ar' : 'en';
      setLanguage(newLang);
      DB.saveSetting('language', newLang);
      Toast.show(t('toast_lang_changed'), 'info');
      Router.navigate('settings');
    });

    document.getElementById('toggleGrid').addEventListener('click', function() {
      this.classList.toggle('active');
      App.viewMode = this.classList.contains('active') ? 'grid' : 'list';
      DB.saveSetting('viewMode', App.viewMode);
    });

    document.getElementById('toggleAnimations').addEventListener('click', function() {
      this.classList.toggle('active');
      const enabled = this.classList.contains('active');
      DB.saveSetting('animations', enabled);
      document.documentElement.style.setProperty('--transition', enabled ? '250ms cubic-bezier(.4,0,.2,1)' : '0ms');
    });

    document.getElementById('clearAllBtn').addEventListener('click', async () => {
      const result = await Dialog.show({
        title: t('settings_clear_all'),
        message: t('settings_clear_desc'),
        input: true,
        inputPlaceholder: t('settings_clear_confirm'),
        cancelText: t('cancel'),
        confirmText: t('settings_clear_btn'),
        danger: true
      });
      if (result === 'DELETE') {
        DB.clearAll();
        clearPosterCache();
        Toast.show(t('toast_deleted'), 'danger');
        Router.navigate('home');
      }
    });
  },

  /* ---- EMPTY STATE ---- */
  emptyState(icon, title, desc, action) {
    return `<div class="empty-state">
      ${icon}
      <h3>${title}</h3>
      <p>${desc}</p>
      ${action ? `<button class="btn btn-primary" onclick="${action}">${ICONS.plus} ${t('add_new')}</button>` : ''}
    </div>`;
  },

  /* ---- POSTER LOADER ---- */
  async loadPosters(container) {
    const imgs = container.querySelectorAll('img[data-poster-id]');
    for (const img of imgs) {
      const id = img.dataset.posterId;
      const url = await getPosterURL(id);
      if (url) {
        img.src = url;
        img.style.display = 'block';
        // Hide placeholder
        const placeholder = img.parentElement.querySelector('.poster-placeholder, .mosaic-placeholder');
        if (placeholder) placeholder.style.display = 'none';
      }
    }
  }
};

/* ============================================
   ACHIEVEMENTS CHECKER
   ============================================ */
const Achievements = {
  check() {
    const titles = DB.getTitles();
    const unlocked = DB.getAchievements();
    ACHIEVEMENT_DEFS.forEach(def => {
      if (!unlocked[def.id] && def.check(titles)) {
        const isNew = DB.saveAchievement(def.id);
        if (isNew) {
          const names = ACHIEVEMENT_NAMES[App.currentLang];
          Toast.show(`${t('toast_achievement')} ${names[def.id].t}`, 'info', 4000);
        }
      }
    });
  }
};

/* ============================================
   LANGUAGE SWITCHER
   ============================================ */
function setLanguage(lang) {
  App.currentLang = lang;
  const html = document.documentElement;
  html.setAttribute('lang', lang);
  html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');

  // Update all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
}

/* ============================================
   GLOBAL SEARCH (Header)
   ============================================ */
function initGlobalSearch() {
  const searchBtn = document.getElementById('searchBtn');
  searchBtn.addEventListener('click', () => {
    App.searchQuery = '';
    App.filterState = { type: 'all', lang: 'all', status: 'all', fav: false, genre: 'all' };
    const current = App.currentView;
    if (current === 'movies' || current === 'series') {
      setTimeout(() => { const input = document.getElementById('titleSearch'); if (input) input.focus(); }, 50);
    } else {
      Router.navigate('movies');
      setTimeout(() => { const input = document.getElementById('titleSearch'); if (input) input.focus(); }, 150);
    }
  });
}

/* ============================================
   HEADER LANGUAGE BUTTON
   ============================================ */
function initLangButton() {
  document.getElementById('langBtn').addEventListener('click', () => {
    const newLang = App.currentLang === 'en' ? 'ar' : 'en';
    setLanguage(newLang);
    DB.saveSetting('language', newLang);
    Toast.show(t('toast_lang_changed'), 'info');
    Renderer.render(App.currentView);
  });
}

/* ============================================
   RIPPLE EFFECT
   ============================================ */
function initRipple() {
  document.addEventListener('click', (e) => {
    const btn = e.target.closest('.btn, .icon-btn, .nav-item');
    if (btn) createRipple(e, btn);
  });
}

/* ============================================
   APPLICATION INIT
   ============================================ */
async function init() {
  // Initialize IndexedDB
  await DB.initIDB();

  // Load saved settings
  const settings = DB.getSettings();
  if (settings.language) setLanguage(settings.language);
  if (settings.viewMode) App.viewMode = settings.viewMode;
  if (settings.animations === false) {
    document.documentElement.style.setProperty('--transition', '0ms');
  }

  // Set brand marks
  const brandMark = document.getElementById('brandMark');
  const sidebarBrandMark = document.getElementById('sidebarBrandMark');
  if (brandMark) brandMark.innerHTML = ICONS.clapper;
  if (sidebarBrandMark) sidebarBrandMark.innerHTML = ICONS.clapper;

  // Initialize components
  Sidebar.init();
  initGlobalSearch();
  initLangButton();
  initRipple();

  // Render home
  Router.navigate(settings.lastScreen || 'home');

  // Check achievements
  Achievements.check();
}

// Expose needed functions to global scope for onclick handlers
window.App = App;
window.Router = Router;
window.DB = DB;

// Start
init();

})();
</script>
</body>
</html>
