<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0B0B0B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="El5al Films - Personal Offline Movie & TV Series Library">
  <title>El5al Films</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="icon-btn" id="menu-btn" aria-label="Menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <span class="header-title" id="header-title">El5al Films</span>
    </div>
    <div class="header-right">
      <button class="icon-btn" id="search-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
      <button class="lang-btn" id="lang-btn">عر</button>
    </div>
  </header>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo" id="sidebar-logo">El5al Films</span>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
    <div class="sidebar-footer">El5al Films &middot; v1.0</div>
  </nav>

  <!-- Main Content -->
  <main class="main">
    <section class="view active" id="view-home"></section>
    <section class="view" id="view-movies"></section>
    <section class="view" id="view-tv"></section>
    <section class="view" id="view-collections"></section>
    <section class="view" id="view-favorites"></section>
    <section class="view" id="view-watched"></section>
    <section class="view" id="view-watchlist"></section>
    <section class="view" id="view-statistics"></section>
    <section class="view" id="view-achievements"></section>
    <section class="view" id="view-settings"></section>
    <section class="view" id="view-form"></section>
    <section class="view" id="view-detail"></section>
    <section class="view" id="view-collectionDetail"></section>
    <section class="view" id="view-globalSearch"></section>
  </main>

  <!-- FAB -->
  <button class="fab" id="fab" aria-label="Add Title">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"></line>
      <line x1="5" y1="12" x2="19" y2="12"></line>
    </svg>
  </button>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Dialog -->
  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog"></div>
  </div>

  <!-- Script -->
  <script src="script.js"></script>
</body>
</html>
